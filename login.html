<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ellevux - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { bg: '#000000', surface: '#0a0a0a', border: '#1f1f1f', primary: '#ffffff', muted: '#888888', glow: '#333333' } } }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { background-color: #000000; color: #ffffff; font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .glass-panel { background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(20px); border: 1px solid #1f1f1f; }
    .glow-bg { position: absolute; width: 400px; height: 400px; border-radius: 50%; filter: blur(80px); opacity: 0.2; pointer-events: none; background: #8a2be2; z-index: -1; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .bg-grid { background-size: 40px 40px; background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px); position: absolute; inset: 0; z-index: -2; mask-image: radial-gradient(circle at center, black, transparent 80%); }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow-bg"></div>
  
  <div class="w-full max-w-md p-8 glass-panel rounded-xl shadow-2xl relative">
    <a href="react_landing.html" class="text-muted hover:text-primary transition-colors text-sm mb-8 inline-block">&larr; Back to Home</a>
    <h1 class="text-3xl font-bold mb-2 tracking-tight">Welcome back</h1>
    <p class="text-muted text-sm mb-8">Enter your credentials to access your console.</p>
    
    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-xs font-mono text-muted uppercase tracking-widest mb-2">Email Address</label>
        <input type="email" id="email" required class="w-full bg-[#050505] border border-border rounded p-3 text-sm focus:outline-none focus:border-primary transition-colors" placeholder="you@company.com">
      </div>
      <div>
        <label class="block text-xs font-mono text-muted uppercase tracking-widest mb-2">Password</label>
        <input type="password" id="password" required class="w-full bg-[#050505] border border-border rounded p-3 text-sm focus:outline-none focus:border-primary transition-colors" placeholder="••••••••">
      </div>
      <div class="pt-2">
        <button type="submit" id="signInBtn" class="w-full bg-primary text-black font-bold py-3 rounded hover:bg-gray-200 transition-colors tracking-wide text-sm flex items-center justify-center space-x-2">
          <span id="btnText">Sign In</span>
          <div id="loader" class="hidden w-4 height-4 border-2 border-black border-t-transparent rounded-full animate-spin"></div>
        </button>
      </div>
    </form>

    <div class="relative my-8">
      <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-border"></div></div>
      <div class="relative flex justify-center text-xs uppercase"><span class="bg-[#0a0a0a] px-2 text-muted">Or continue with</span></div>
    </div>

    <button id="googleBtn" class="w-full bg-surface border border-border text-primary font-medium py-3 rounded hover:bg-[#151515] transition-all tracking-wide text-sm flex items-center justify-center space-x-3 group">
      <svg class="w-5 h-5 group-hover:scale-110 transition-transform" viewBox="0 0 24 24">
        <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      <span>Sign in with Google</span>
    </button>

    <div class="mt-6 text-center text-sm text-muted">
      Don't have an account? <a href="signup.html" class="text-primary hover:underline transition-all">Sign up</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    const loginForm = document.getElementById('loginForm');
    const signInBtn = document.getElementById('signInBtn');
    const googleBtn = document.getElementById('googleBtn');
    const btnText = document.getElementById('btnText');
    const loader = document.getElementById('loader');

    const setLoading = (loading) => {
      if (loading) {
        signInBtn.disabled = true;
        btnText.classList.add('opacity-50');
        loader.classList.remove('hidden');
      } else {
        signInBtn.disabled = false;
        btnText.classList.remove('opacity-50');
        loader.classList.add('hidden');
      }
    };

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      setLoading(true);
      const { data, error } = await window.supabaseClient.auth.signInWithPassword({
        email,
        password,
      });

      if (error) {
        alert(error.message);
        setLoading(false);
      } else {
        window.location.href = 'dashboard.html';
      }
    });

    googleBtn.addEventListener('click', async () => {
      const { data, error } = await window.supabaseClient.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.origin + '/dashboard.html'
        }
      });
      if (error) alert(error.message);
    });
  </script>
  <script src="nav.js"></script>
</body>
</html>
