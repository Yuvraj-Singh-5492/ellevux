<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ellevux Console - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { bg: '#000000', surface: '#0a0a0a', border: '#1f1f1f', primary: '#ffffff', muted: '#888888', accent: '#4169e1' } } }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    body { background-color: #000000; color: #ffffff; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
    ::selection { background:#fff; color:#000; }
    .main-content::-webkit-scrollbar { width: 8px; }
    .main-content::-webkit-scrollbar-thumb { background: #1f1f1f; border-radius: 99px; }
    .main-content::-webkit-scrollbar-thumb:hover { background: #2e2e2e; }

    .sidebar { width: 264px; background: #050505; border-right: 1px solid #1f1f1f; display: flex; flex-direction: column; position: relative; z-index: 1; }
    .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; background: #000000; position: relative; }

    main.main-content > * { position: relative; z-index: 1; }

    /* Hero-style grid. Fixed full-viewport, so the mask is biased toward the
       top-center (where content sits) instead of dead-center, otherwise the
       visible grid lands only in the masked-out edges. */
    .main-content > .ambient-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-size: 40px 40px;
      background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                        linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      mask-image: radial-gradient(circle at 50% 30%, black, transparent 80%);
      -webkit-mask-image: radial-gradient(circle at 50% 30%, black, transparent 80%);
    }

    /* Floating elegant brand shapes (echo the landing hero) */
    .ambient-shapes { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .ambient-shapes .shp {
      position: absolute; border-radius: 9999px; filter: blur(72px); opacity: 0.45;
      background: linear-gradient(to right, var(--col), transparent 75%);
    }
    .ambient-shapes .s1 { width: 540px; height: 150px; top: 4%;  right: -6%; --col: rgba(65,105,225,0.45);  transform: rotate(14deg);  animation: ashift1 28s ease-in-out infinite; }
    .ambient-shapes .s2 { width: 460px; height: 130px; top: 50%; left: -8%;  --col: rgba(138,43,226,0.40); transform: rotate(-16deg); animation: ashift2 34s ease-in-out infinite; }
    .ambient-shapes .s3 { width: 360px; height: 110px; bottom: 6%; right: 16%; --col: rgba(109,40,217,0.35); transform: rotate(-8deg);  animation: ashift3 31s ease-in-out infinite; }
    @keyframes ashift1 { 0%,100%{transform:rotate(14deg) translate(0,0)} 50%{transform:rotate(14deg) translate(-40px,40px)} }
    @keyframes ashift2 { 0%,100%{transform:rotate(-16deg) translate(0,0)} 50%{transform:rotate(-16deg) translate(50px,-30px)} }
    @keyframes ashift3 { 0%,100%{transform:rotate(-8deg) translate(0,0)} 50%{transform:rotate(-8deg) translate(-30px,-40px)} }
    @media (prefers-reduced-motion: reduce) { .ambient-shapes .shp { animation: none; } }

    .glass-panel { background: linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0.025) 55%); backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%); border: 1px solid rgba(255,255,255,0.12); box-shadow: inset 0 1px 0 rgba(255,255,255,0.22), 0 10px 30px -14px rgba(0,0,0,0.7); }
    .bg-grid { background-size: 32px 32px; background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px); }

    .nav-item { position: relative; display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 10px; font-size: 14px; color: #888888; transition: color .2s, background .2s; cursor: pointer; }
    .nav-item:hover { background: rgba(255,255,255,.04); color: #ffffff; }
    .nav-item.active { background: rgba(65,105,225,.14); color: #ffffff; font-weight: 600; }
    .nav-item.active::before { content: ''; position: absolute; left: -5px; top: 50%; transform: translateY(-50%); width: 3px; height: 18px; border-radius: 99px; background: #4169e1; box-shadow: 0 0 12px #4169e1; }

    /* Glass cards — used by stat cards, agent cards, settings, etc. */
    .stat-card {
      position: relative; isolation: isolate; overflow: hidden;
      background: linear-gradient(135deg, rgba(255,255,255,0.09), rgba(255,255,255,0.03) 55%, rgba(255,255,255,0.015));
      backdrop-filter: blur(22px) saturate(170%);
      -webkit-backdrop-filter: blur(22px) saturate(170%);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 24px; border-radius: 16px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.25),
        inset 0 -22px 44px -22px rgba(0,0,0,0.5),
        0 14px 36px -18px rgba(0,0,0,0.7);
      transition: transform .3s cubic-bezier(.2,.8,.2,1), border-color .3s ease, box-shadow .3s ease;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 55%;
      background: linear-gradient(160deg, rgba(255,255,255,0.12), rgba(255,255,255,0) 60%);
      border-radius: inherit; pointer-events: none; z-index: 0;
    }
    .stat-card::after {
      content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 1px;
      background: linear-gradient(135deg, rgba(110,140,255,0.9), rgba(168,85,247,0.5) 45%, transparent 75%);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude;
      opacity: 0; transition: opacity .35s ease; z-index: 2; pointer-events: none;
    }
    .stat-card > * { position: relative; z-index: 1; }
    .stat-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,0.18);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.35),
        inset 0 -22px 44px -22px rgba(0,0,0,0.5),
        0 26px 54px -22px rgba(0,0,0,0.8),
        0 0 44px -16px rgba(65,105,225,0.45);
    }
    .stat-card:hover::after { opacity: 1; }

    .status-pill { padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    .status-online { background: rgba(39, 201, 63, 0.1); color: #27c93f; border: 1px solid rgba(39, 201, 63, 0.2); }

    .stat-ic { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }

    /* Card entrance animation */
    #tab-content > * { animation: cardIn .5s cubic-bezier(.2,.8,.2,1) both; }
    #tab-content > *:nth-child(2) { animation-delay: .06s; }
    #tab-content > *:nth-child(3) { animation-delay: .12s; }
    #tab-content > *:nth-child(4) { animation-delay: .18s; }
    @keyframes cardIn { from { opacity:0; transform: translateY(14px); } to { opacity:1; transform:none; } }

    /* Tables inherit a cleaner look */
    table tbody tr { transition: background .2s ease; }

    @media (prefers-reduced-motion: reduce) {
      .main-content::before, .main-content::after, #tab-content > * { animation: none; }
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar p-5">
    <div class="mb-8 px-1 flex items-center gap-2 cursor-pointer" onclick="window.location.href='react_landing.html'">
      <img src="logo-icon.png" alt="" class="h-8 w-auto">
      <span class="text-lg font-semibold tracking-tight">ellevux</span>
    </div>

    <div class="text-[10px] font-mono uppercase tracking-widest text-muted px-3 mb-2">Menu</div>
    <nav class="flex-1 space-y-1" id="sidebar-nav">
      <div class="nav-item active" data-tab="overview"><i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard</div>
      <div class="nav-item" data-tab="agents"><i data-lucide="users" class="w-5 h-5"></i> Agents</div>
      <div class="nav-item" data-tab="calls"><i data-lucide="phone" class="w-5 h-5"></i> Call Logs</div>
      <div class="nav-item" data-tab="calendar"><i data-lucide="calendar" class="w-5 h-5"></i> Schedule</div>
      <div class="nav-item" data-tab="settings"><i data-lucide="settings" class="w-5 h-5"></i> Settings</div>
    </nav>
    
    <div class="mt-auto pt-6 border-t border-border">
      <div class="flex items-center gap-3 px-2 mb-6">
        <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-accent to-[#8a2be2] flex items-center justify-center font-bold text-sm" id="userInitials">--</div>
        <div class="overflow-hidden">
          <div class="text-sm font-bold truncate" id="userName">Loading...</div>
          <div class="text-xs text-muted truncate" id="userEmail">...</div>
        </div>
      </div>
      <button onclick="handleSwitchAccount()" class="w-full flex items-center gap-2 px-4 py-2 text-sm text-muted hover:text-primary transition-colors mb-1">
        <i data-lucide="users" class="w-4 h-4"></i> Switch Account
      </button>
      <button onclick="handleSignOut()" class="w-full flex items-center gap-2 px-4 py-2 text-sm text-muted hover:text-red-500 transition-colors">
        <i data-lucide="log-out" class="w-4 h-4"></i> Sign Out
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="ambient-grid"></div>
    <div class="ambient-shapes"><span class="shp s1"></span><span class="shp s2"></span><span class="shp s3"></span></div>
    <header class="h-16 border-b border-border flex items-center justify-between px-8 bg-[#050505]/60 backdrop-blur-xl sticky top-0 z-20">
      <h2 class="text-lg font-bold tracking-tight" id="page-title">Overview</h2>
      <div class="flex items-center gap-4">
        <div class="relative group">
          <i data-lucide="bell" class="w-5 h-5 text-muted cursor-pointer hover:text-primary"></i>
          <span class="absolute -top-1 -right-1 w-2 h-2 bg-accent rounded-full"></span>
          <div class="absolute right-0 mt-2 w-64 glass-panel rounded-lg p-4 opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity text-xs space-y-3 z-50">
            <div class="font-bold border-b border-border pb-2">Notifications</div>
            <div class="text-muted">Agent Jessica scheduled a new job.</div>
            <div class="text-muted">Call #4092 summary generated.</div>
          </div>
        </div>
        <button onclick="openModal('modal-overlay', 'modal-content')" class="group inline-flex items-center gap-2 bg-primary text-black px-4 py-2 rounded-lg text-sm font-semibold hover:-translate-y-0.5 hover:shadow-[0_8px_24px_-8px_rgba(255,255,255,0.4)] transition-all duration-200">
          <i data-lucide="plus" class="w-4 h-4"></i> New Agent
        </button>
      </div>
    </header>

    <div class="p-8 space-y-8 relative" id="tab-content">
      <!-- Content will be injected here -->
       <div class="flex items-center justify-center h-64"><div class="animate-spin w-8 h-8 border-2 border-primary border-t-transparent rounded-full"></div></div>
    </div>
  </main>

  <!-- Create Modal -->
  <div id="modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
    <div class="w-full max-w-md glass-panel rounded-xl p-8 shadow-2xl scale-95 opacity-0 transition-all duration-300" id="modal-content">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-2xl font-bold">Create New Agent</h3>
        <button onclick="closeModal('modal-overlay', 'modal-content')" class="text-muted hover:text-primary"><i data-lucide="x" class="w-6 h-6"></i></button>
      </div>
      <form class="space-y-4" id="agent-form">
        <div>
          <label class="block text-xs font-mono text-muted uppercase tracking-widest mb-2">Agent Name</label>
          <input type="text" id="agent-name" required placeholder="e.g. Front Desk" class="w-full bg-[#050505] border border-border rounded p-3 text-sm focus:outline-none focus:border-primary">
        </div>
        <div>
          <label class="block text-xs font-mono text-muted uppercase tracking-widest mb-2">Voice Identity</label>
          <select id="agent-voice" class="w-full bg-[#050505] border border-border rounded p-3 text-sm focus:outline-none focus:border-primary appearance-none">
            <option value="jessica_v4">Jessica (v4) - Professional</option>
            <option value="marcus_v2">Marcus (v2) - Casual</option>
            <option value="sofia_v1">Sofia (v1) - Friendly</option>
          </select>
        </div>
        <div class="pt-4">
          <button type="submit" id="create-agent-btn" class="w-full bg-primary text-black font-bold py-3 rounded hover:bg-gray-200 transition-colors flex items-center justify-center gap-2">
            <span id="create-btn-text">Create Agent</span>
            <div id="create-btn-loader" class="hidden w-4 h-4 border-2 border-black border-t-transparent rounded-full animate-spin"></div>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="edit-modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
    <div class="w-full max-w-md glass-panel rounded-xl p-8 shadow-2xl scale-95 opacity-0 transition-all duration-300" id="edit-modal-content">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-2xl font-bold">Edit Agent</h3>
        <button onclick="closeModal('edit-modal-overlay', 'edit-modal-content')" class="text-muted hover:text-primary"><i data-lucide="x" class="w-6 h-6"></i></button>
      </div>
      <form class="space-y-4" id="edit-agent-form">
        <input type="hidden" id="edit-agent-id">
        <div>
          <label class="block text-xs font-mono text-muted uppercase tracking-widest mb-2">Agent Name</label>
          <input type="text" id="edit-agent-name" required class="w-full bg-[#050505] border border-border rounded p-3 text-sm focus:outline-none focus:border-primary">
        </div>
        <div>
          <label class="block text-xs font-mono text-muted uppercase tracking-widest mb-2">Voice Identity</label>
          <select id="edit-agent-voice" class="w-full bg-[#050505] border border-border rounded p-3 text-sm focus:outline-none focus:border-primary appearance-none">
            <option value="jessica_v4">Jessica (v4) - Professional</option>
            <option value="marcus_v2">Marcus (v2) - Casual</option>
            <option value="sofia_v1">Sofia (v1) - Friendly</option>
          </select>
        </div>
        <div class="pt-4">
          <button type="submit" id="edit-agent-btn" class="w-full bg-primary text-black font-bold py-3 rounded hover:bg-gray-200 transition-colors">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    lucide.createIcons();

    let currentTab = 'overview';
    let agents = [];
    let calls = [];
    let userEmail = '';

    // ---- Demo mode (no login): dashboard.html?demo shows the console pre-filled with sample data ----
    const DEMO = new URLSearchParams(location.search).has('demo');
    const _now = Date.now(), _h = 3600000, _d = 86400000;
    const DEMO_AGENTS = [
      { id:'d1', name:'Jordan', voice_id:'jordan_v4', user_id:'demo', status:'online', created_at:new Date(_now-2*_d).toISOString(), valid_until:new Date(_now+28*_d).toISOString() },
      { id:'d2', name:'Riley',  voice_id:'riley_v2',  user_id:'demo', status:'online', created_at:new Date(_now-9*_d).toISOString(), valid_until:new Date(_now+21*_d).toISOString() }
    ];
    const DEMO_CALLS = [
      { id:'c1', created_at:new Date(_now-35*60000).toISOString(), user_id:'demo', agent_id:'d1', caller_name:'Lisa Tran', caller_number:'+1 (555) 019-2834', duration_seconds:48, status:'completed', job_booked:true, recording:'demo.mp3', summary:'Emergency leak. Qualified the issue, dispatched a tech, and booked a same-day visit.' },
      { id:'c2', created_at:new Date(_now-2*_h).toISOString(),  user_id:'demo', agent_id:'d1', caller_name:'John Doe',    caller_number:'+1 (555) 234-5678', duration_seconds:124, status:'completed', job_booked:true,  summary:'HVAC no-heat call. Qualified the issue and booked a maintenance visit for Tuesday 2pm.' },
      { id:'c3', created_at:new Date(_now-5*_h).toISOString(),  user_id:'demo', agent_id:'d2', caller_name:'Sarah Smith', caller_number:'+1 (555) 987-6543', duration_seconds:86,  status:'completed', job_booked:true,  summary:'Quote request for a water-heater install. Captured details and scheduled an estimate.' },
      { id:'c4', created_at:new Date(_now-9*_h).toISOString(),  user_id:'demo', agent_id:'d1', caller_name:'Mike Reyes',  caller_number:'+1 (555) 441-2200', duration_seconds:53,  status:'completed', job_booked:false, summary:'Pricing question on drain cleaning. Answered FAQs and sent a follow-up SMS.' },
      { id:'c5', created_at:new Date(_now-_d-3*_h).toISOString(), user_id:'demo', agent_id:'d2', caller_name:'Unknown',  caller_number:'+1 (555) 300-9911', duration_seconds:0,   status:'missed',    job_booked:false, summary:'Missed call outside hours; auto-SMS sent with a booking link.' }
    ];
    function demoNudge() { alert("You're viewing a live demo with sample data. Sign up to create and manage your own AI agents."); }

    // Call-recording player — folds the old voice demo INTO the dashboard: a recorded call opens an audio + transcript popup.
    function closeRec() {
      const o = document.getElementById('rec-overlay');
      if (o) { try { const a = o.querySelector('audio'); if (a) a.pause(); } catch (e) {} o.remove(); }
    }
    function openCallRecording(id) {
      closeRec();
      const c = (calls || []).find(x => x.id === id) || {};
      const agentName = (agents.find(a => a.id === c.agent_id) || {}).name || 'Agent';
      if (!document.getElementById('rec-style')) {
        const st = document.createElement('style'); st.id = 'rec-style';
        st.textContent = '@keyframes recwave{0%,100%{transform:scaleY(.35)}50%{transform:scaleY(1)}}.rec-bar{width:3px;border-radius:99px;background:#3554c4;}.rec-playing .rec-bar{background:#4169e1;animation:recwave 1.1s ease-in-out infinite}';
        document.head.appendChild(st);
      }
      const tx = [
        ['AI','call picked up','"Thank you for calling Apex Plumbing, this is the front desk. How can I help?"'],
        ['C','caller','"Hi, I\'ve got water pouring out from under my sink, it\'s an emergency."'],
        ['AI','issue detected','"Got it, that\'s an emergency. I can get a technician out to you today. What\'s the address?"'],
        ['C','caller','"42 Oak Street."'],
        ['AI','booking confirmed','"Perfect. A tech is booked for 2:30pm today and I\'ve texted you the confirmation. Anything else I can help with?"']
      ];
      const txHtml = tx.map(function (l) {
        var ai = l[0] === 'AI';
        return '<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:12px;">'
          + '<div style="width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;' + (ai ? 'background:rgba(65,105,225,.2);color:#6f8cff;' : 'background:#333;color:#fff;') + '">' + (ai ? 'AI' : 'C') + '</div>'
          + '<div><span style="font-family:ui-monospace,monospace;font-size:10px;color:' + (ai ? '#6f8cff' : '#ffbd2e') + ';background:' + (ai ? 'rgba(65,105,225,.1)' : 'rgba(255,189,46,.1)') + ';border:1px solid ' + (ai ? 'rgba(65,105,225,.2)' : 'rgba(255,189,46,.2)') + ';border-radius:4px;padding:1px 6px;display:inline-block;margin-bottom:5px;">[ ' + l[1] + ' ]</span>'
          + '<p style="margin:0;color:' + (ai ? '#e6e6e6' : '#fff') + ';line-height:1.5;font-size:13px;">' + l[2] + '</p></div></div>';
      }).join('');
      var bars = '';
      for (var i = 0; i < 40; i++) bars += '<div class="rec-bar" style="height:' + (Math.sin(i * 0.5) * 12 + Math.random() * 16 + 8) + 'px;animation-delay:' + (i * 0.04) + 's;"></div>';
      const ov = document.createElement('div');
      ov.id = 'rec-overlay';
      ov.style.cssText = 'position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.78);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:18px;font-family:Inter,sans-serif;';
      ov.innerHTML =
        '<div style="background:#0a0a0a;border:1px solid #1f1f1f;border-radius:20px;max-width:640px;width:100%;max-height:90vh;overflow:auto;box-shadow:0 30px 80px -20px rgba(0,0,0,.9);">'
        + '<div style="display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid #1f1f1f;">'
        + '<div><div style="font-weight:700;color:#fff;">' + (c.caller_name || 'Caller') + ' <span style="font-family:ui-monospace,monospace;font-size:11px;color:#888;">' + (c.caller_number || '') + '</span></div>'
        + '<div style="font-size:11px;color:#888;margin-top:2px;">Handled by ' + agentName + ' &middot; ' + (c.duration_seconds || 0) + 's</div></div>'
        + '<button onclick="closeRec()" aria-label="Close" style="background:transparent;border:0;color:#888;cursor:pointer;font-size:24px;line-height:1;padding:4px;">&times;</button>'
        + '</div>'
        + '<div style="padding:20px;">'
        + '<div style="font-family:ui-monospace,monospace;font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.12em;margin-bottom:14px;">Call recording</div>'
        + '<div style="background:#050505;border:1px solid #1f1f1f;border-radius:14px;padding:18px;margin-bottom:20px;">'
        + '<div id="rec-wave" style="display:flex;align-items:center;justify-content:center;gap:3px;height:56px;margin-bottom:14px;">' + bars + '</div>'
        + '<div id="rec-track" style="height:6px;border-radius:99px;background:#1f1f1f;position:relative;cursor:pointer;"><div id="rec-fill" style="position:absolute;left:0;top:0;height:100%;width:0%;border-radius:99px;background:#4169e1;"></div></div>'
        + '<div style="display:flex;justify-content:space-between;font-family:ui-monospace,monospace;font-size:11px;color:#888;margin-top:8px;"><span id="rec-cur">0:00</span><span id="rec-dur">0:48</span></div>'
        + '<div style="display:flex;align-items:center;justify-content:center;gap:22px;margin-top:14px;">'
        + '<button id="rec-back" aria-label="Back 10s" style="background:transparent;border:0;color:#888;cursor:pointer;"><i data-lucide="rotate-ccw" style="width:20px;height:20px;"></i></button>'
        + '<button id="rec-play" aria-label="Play" style="width:56px;height:56px;border-radius:50%;background:#fff;color:#000;border:0;cursor:pointer;display:flex;align-items:center;justify-content:center;"><i data-lucide="play" style="width:24px;height:24px;margin-left:2px;"></i></button>'
        + '<button id="rec-fwd" aria-label="Forward 10s" style="background:transparent;border:0;color:#888;cursor:pointer;"><i data-lucide="rotate-cw" style="width:20px;height:20px;"></i></button>'
        + '</div></div>'
        + '<div style="font-family:ui-monospace,monospace;font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.12em;margin-bottom:12px;">Transcript</div>'

        + '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;padding-top:14px;border-top:1px solid #1f1f1f;">'
        + '<span style="font-size:11px;font-weight:500;padding:4px 10px;border-radius:6px;background:rgba(220,20,60,.1);color:#ff6b6b;border:1px solid rgba(220,20,60,.2);">Emergency detected</span>'
        + '<span style="font-size:11px;font-weight:500;padding:4px 10px;border-radius:6px;background:rgba(39,201,63,.1);color:#27c93f;border:1px solid rgba(39,201,63,.2);">Slot booked</span>'
        + '</div>'
        + '<audio id="rec-audio" src="' + (c.recording || 'demo.mp3') + '" preload="metadata"></audio>'
        + '</div></div>';
      document.body.appendChild(ov);
      lucide.createIcons();
      ov.addEventListener('click', function (e) { if (e.target === ov) closeRec(); });
      var audio = document.getElementById('rec-audio');
      var playBtn = document.getElementById('rec-play'), wave = document.getElementById('rec-wave');
      var fill = document.getElementById('rec-fill'), track = document.getElementById('rec-track');
      var cur = document.getElementById('rec-cur'), dur = document.getElementById('rec-dur');
      function fmt(s) { if (!isFinite(s)) return '0:00'; var m = Math.floor(s / 60), x = Math.floor(s % 60); return m + ':' + String(x).padStart(2, '0'); }
      function setIcon(n) { playBtn.innerHTML = '<i data-lucide="' + n + '" style="width:24px;height:24px;' + (n === 'play' ? 'margin-left:2px;' : '') + '"></i>'; lucide.createIcons(); }
      audio.addEventListener('loadedmetadata', function () { if (isFinite(audio.duration)) dur.textContent = fmt(audio.duration); });
      playBtn.addEventListener('click', function () { if (audio.paused) audio.play(); else audio.pause(); });
      audio.addEventListener('play', function () { setIcon('pause'); wave.classList.add('rec-playing'); });
      audio.addEventListener('pause', function () { setIcon('play'); wave.classList.remove('rec-playing'); });
      audio.addEventListener('timeupdate', function () { var p = audio.duration ? audio.currentTime / audio.duration * 100 : 0; fill.style.width = p + '%'; cur.textContent = fmt(audio.currentTime); });
      audio.addEventListener('ended', function () { setIcon('play'); wave.classList.remove('rec-playing'); fill.style.width = '0%'; cur.textContent = '0:00'; audio.currentTime = 0; });
      track.addEventListener('click', function (e) { var r = track.getBoundingClientRect(); var ratio = Math.min(1, Math.max(0, (e.clientX - r.left) / r.width)); if (audio.duration) audio.currentTime = ratio * audio.duration; });
      document.getElementById('rec-back').addEventListener('click', function () { audio.currentTime = Math.max(0, audio.currentTime - 10); });
      document.getElementById('rec-fwd').addEventListener('click', function () { if (audio.duration) audio.currentTime = Math.min(audio.duration, audio.currentTime + 10); });
    }

    // DB Operations
    async function fetchAgents() {
      if (DEMO) { agents = DEMO_AGENTS.slice(); calls = DEMO_CALLS.slice(); switchTab(currentTab); return; }
      const { data: agentsData, error: agentsError } = await window.supabaseClient.from('agents').select('*').order('created_at', { ascending: false });
      if (agentsError) console.error('Error fetching agents:', agentsError);
      else agents = agentsData || [];

      const { data: callsData, error: callsError } = await window.supabaseClient.from('calls').select('*').order('created_at', { ascending: false });
      if (callsError) console.error('Error fetching calls:', callsError);
      else calls = callsData || [];

      switchTab(currentTab);
    }

    async function deleteAgent(id, forceHardDelete = false) {
      if (DEMO) { demoNudge(); return; }
      if (forceHardDelete) {
        if (!confirm("Permanently delete this agent? This action cannot be undone.")) return;
        const { error } = await window.supabaseClient.from('agents').delete().eq('id', id);
        if (error) alert(error.message);
        else fetchAgents();
      } else {
        if (!confirm("Cancel this agent's subscription? It will remain active until its expiration date.")) return;
        const { error } = await window.supabaseClient.from('agents').update({ status: 'cancelling' }).eq('id', id);
        if (error) alert(error.message);
        else fetchAgents();
      }
    }

    async function restoreAgent(id) {
      if (DEMO) { demoNudge(); return; }
      if (!confirm("Restore this agent's active subscription?")) return;
      const { error } = await window.supabaseClient.from('agents').update({ status: 'online' }).eq('id', id);
      if (error) alert(error.message);
      else fetchAgents();
    }

    const formatDate = (dateStr) => {
      if (!dateStr) return 'N/A';
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    };

    // Agent Form Logic
    const initFormListeners = () => {
      document.getElementById('agent-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (DEMO) { demoNudge(); return; }
        const name = document.getElementById('agent-name').value;
        const voice = document.getElementById('agent-voice').value;
        
        if (userEmail === 'yuvrajsinghgill5492@gmail.com') {
          // Bypass pricing page, insert agent directly
          const { data: { session } } = await window.supabaseClient.auth.getSession();
          const { error } = await window.supabaseClient.from('agents').insert([
            { 
              name: name, 
              voice_id: voice, 
              user_id: session.user.id,
              status: 'online',
              valid_until: new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString()
            }
          ]);

          if (error) {
            alert('Error creating agent: ' + error.message);
          } else {
            alert(`Success! Test Agent "${name}" has been created directly without payment.`);
            closeModal('modal-overlay', 'modal-content');
            fetchAgents();
          }
        } else {
          // Instead of inserting immediately, redirect to pricing/payment
          window.location.href = `pricing.html?name=${encodeURIComponent(name)}&voice=${encodeURIComponent(voice)}`;
        }
      });

      document.getElementById('edit-agent-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (DEMO) { demoNudge(); return; }
        const id = document.getElementById('edit-agent-id').value;
        const name = document.getElementById('edit-agent-name').value;
        const voice = document.getElementById('edit-agent-voice').value;
        const { error } = await window.supabaseClient.from('agents').update({ name, voice_id: voice }).eq('id', id);
        if (error) alert(error.message);
        else { closeModal('edit-modal-overlay', 'edit-modal-content'); fetchAgents(); }
      });
    };

    async function checkUser() {
      if (DEMO) {
        userEmail = 'demo@ellevux.com';
        document.getElementById('userName').innerText = 'Demo Workspace';
        document.getElementById('userEmail').innerText = 'sample data';
        if (document.getElementById('welcomeName')) document.getElementById('welcomeName').innerText = 'there';
        document.getElementById('userInitials').innerText = 'DW';
        return;
      }
      const { data: { session } } = await window.supabaseClient.auth.getSession();
      if (!session) { window.location.href = 'login.html'; return; }
      userEmail = session.user.email;
      const meta = session.user.user_metadata || {};
      const firstName = meta.first_name || meta.given_name || meta.full_name?.split(' ')[0] || 'User';
      const lastName = meta.last_name || meta.family_name || meta.full_name?.split(' ').slice(1).join(' ') || '';
      document.getElementById('userName').innerText = `${firstName} ${lastName}`.trim();
      document.getElementById('userEmail').innerText = session.user.email;
      if (document.getElementById('welcomeName')) document.getElementById('welcomeName').innerText = firstName;
      document.getElementById('userInitials').innerText = (firstName[0] || 'U') + (lastName[0] || '');
    }

    async function handleSwitchAccount() {
      await window.supabaseClient.auth.signOut();
      window.location.href = 'login.html';
    }

    async function handleSignOut() {
      await window.supabaseClient.auth.signOut();
      window.location.href = 'react_landing.html';
    }

    // Modal Logic
    function openModal(overlayId, contentId) {
      document.getElementById(overlayId).classList.remove('hidden');
      setTimeout(() => {
        document.getElementById(contentId).classList.remove('scale-95', 'opacity-0');
        document.getElementById(contentId).classList.add('scale-100', 'opacity-100');
      }, 10);
    }

    function closeModal(overlayId, contentId) {
      document.getElementById(contentId).classList.remove('scale-100', 'opacity-100');
      document.getElementById(contentId).classList.add('scale-95', 'opacity-0');
      setTimeout(() => document.getElementById(overlayId).classList.add('hidden'), 300);
    }

    function openEditModal(id, name, voice) {
      document.getElementById('edit-agent-id').value = id;
      document.getElementById('edit-agent-name').value = name;
      document.getElementById('edit-agent-voice').value = voice;
      openModal('edit-modal-overlay', 'edit-modal-content');
    }

    checkUser();
    fetchAgents();
    initFormListeners();

    // Floating "live demo" pill + Get Started CTA (demo mode only)
    if (DEMO) {
      const bar = document.createElement('div');
      bar.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:60;display:flex;align-items:center;gap:14px;background:rgba(10,10,10,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid #2a2a2a;color:#e6e6e6;padding:9px 9px 9px 16px;border-radius:999px;box-shadow:0 14px 40px -12px rgba(0,0,0,.85);font-family:Inter,sans-serif;font-size:13px;font-weight:500;';
      bar.innerHTML = '<span style="display:flex;align-items:center;gap:8px;"><span style="width:8px;height:8px;border-radius:50%;background:#27c93f;box-shadow:0 0 8px #27c93f;"></span>Live demo &middot; sample data</span><a href="signup.html" style="background:#fff;color:#000;text-decoration:none;font-weight:600;padding:7px 14px;border-radius:999px;">Get started &rarr;</a>';
      document.body.appendChild(bar);
      // ?demo&play deep-link (from "Hear a live call") -> auto-open the recorded call
      if (new URLSearchParams(location.search).has('play')) {
        setTimeout(function () { var r = (DEMO_CALLS.find(function (c) { return c.recording; }) || {}).id; if (r) openCallRecording(r); }, 450);
      }
    }
  </script>
</body>
