<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ellevux - Autonomous AI Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#000000',
            surface: '#0a0a0a',
            surface2: '#141414',
            border: '#1f1f1f',
            glow: '#333333',
            primary: '#ffffff',
            muted: '#888888',
            accent: '#e6e6e6'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace']
          },
          backgroundImage: {
            'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap" rel="stylesheet">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>

  <style>
    body { background-color: #000000; color: #ffffff; margin: 0; padding: 0; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    ::selection { background: #ffffff; color: #000000; }
    .glass-panel {
      background: rgba(10, 10, 10, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid #1f1f1f;
    }
    
    .glow-bg {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }
    .glow-purple { background: #8a2be2; }
    .glow-blue { background: #4169e1; }
    .glow-red { background: #dc143c; }

    /* For Mac window dots */
    .mac-dot {
      width: 12px; height: 12px; border-radius: 50%;
    }
    .mac-close { background: #ff5f56; border: 1px solid #e0443e; }
    .mac-min { background: #ffbd2e; border: 1px solid #dea123; }
    .mac-max { background: #27c93f; border: 1px solid #1aab29; }

    .bg-grid {
      background-size: 40px 40px;
      background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                        linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      position: absolute;
      inset: 0;
      z-index: 0;
      mask-image: radial-gradient(circle at center, black, transparent 80%);
    }

    .bento-glow {
      position: relative;
    }
    .bento-glow::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      background: linear-gradient(45deg, rgba(138,43,226,0.3), rgba(65,105,225,0.3), transparent 60%);
      z-index: -1;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .bento-glow:hover::before {
      opacity: 1;
    }

    /* Animated hero aurora — soft, drifting blurry blobs */
    .hero-aurora {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 780px;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .hero-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      will-change: transform;
      mix-blend-mode: screen;
    }
    .hero-blob.b1 {
      width: 460px; height: 460px;
      background: radial-gradient(circle at 30% 30%, rgba(138,43,226,0.85), transparent 70%);
      top: -40px; left: 6%;
      opacity: 0.55;
      animation: drift1 24s ease-in-out infinite;
    }
    .hero-blob.b2 {
      width: 520px; height: 520px;
      background: radial-gradient(circle at 65% 40%, rgba(65,105,225,0.8), transparent 70%);
      top: 10px; right: 2%;
      opacity: 0.5;
      animation: drift2 28s ease-in-out infinite;
    }
    .hero-blob.b3 {
      width: 360px; height: 360px;
      background: radial-gradient(circle at 50% 50%, rgba(109,40,217,0.75), transparent 70%);
      top: 22%; left: 38%;
      opacity: 0.45;
      animation: drift3 32s ease-in-out infinite;
    }
    @keyframes drift1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(110px, 70px) scale(1.15); }
      66%      { transform: translate(40px, 130px) scale(0.95); }
    }
    @keyframes drift2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(-100px, 90px) scale(1.1); }
      66%      { transform: translate(-50px, -30px) scale(1.05); }
    }
    @keyframes drift3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%      { transform: translate(-90px, -50px) scale(1.2); }
    }
    @media (prefers-reduced-motion: reduce) {
      .hero-blob { animation: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { motion, AnimatePresence, useScroll, useTransform, useSpring, useInView } = window.Motion;

    function Icon({ name, className = "", size = 24 }) {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current && window.lucide) {
          window.lucide.createIcons({
            root: ref.current,
            attrs: { class: className, width: size, height: size }
          });
        }
      }, [name, className, size]);
      return <span ref={ref} className="inline-flex items-center justify-center"><i data-lucide={name}></i></span>;
    }

    function Navbar({ user }) {
      const [scrolled, setScrolled] = useState(false);
      const [menuOpen, setMenuOpen] = useState(false);

      const handleSignOut = async () => {
        await window.supabaseClient.auth.signOut();
      };

      useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 16);
        onScroll();
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') setMenuOpen(false); };
        window.addEventListener('keydown', onKey);
        document.body.style.overflow = menuOpen ? 'hidden' : '';
        return () => { window.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
      }, [menuOpen]);

      const navLinks = [
        { href: 'docs.html', label: 'Docs' },
        { href: 'pricing.html', label: 'Pricing' },
        { href: 'changelog.html', label: 'Changelog' },
      ];

      const focusRing = "focus:outline-none focus-visible:ring-2 focus-visible:ring-white/40 focus-visible:ring-offset-2 focus-visible:ring-offset-black";

      return (
        <header className="fixed top-0 inset-x-0 z-50 flex justify-center px-4">
          <nav
            className={`mt-3 w-full max-w-6xl flex items-center justify-between rounded-2xl px-4 md:px-5 transition-all duration-300 ease-out ${
              scrolled
                ? 'h-16 bg-black/60 backdrop-blur-xl border border-white/10 shadow-[0_8px_32px_-12px_rgba(0,0,0,0.7)]'
                : 'h-[72px] bg-transparent border border-transparent'
            }`}
          >
            {/* Left: logo + desktop links */}
            <div className="flex items-center gap-8">
              <a href="react_landing.html" aria-label="Ellevux home" className={`group flex items-center gap-2 rounded-lg transition-transform duration-300 hover:scale-[1.03] ${focusRing}`}>
                <img src="logo-icon.png" alt="" className="h-7 w-auto" />
                <span className="text-lg font-semibold tracking-tight text-primary leading-none">ellevux</span>
              </a>
              <div className="hidden md:flex items-center gap-1 text-sm">
                {navLinks.map((l) => (
                  <a key={l.href} href={l.href}
                     className={`px-3 py-2 rounded-lg text-muted hover:text-primary hover:bg-white/5 transition-colors ${focusRing}`}>
                    {l.label}
                  </a>
                ))}
              </div>
            </div>

            {/* Right: desktop CTAs */}
            <div className="hidden md:flex items-center gap-2 text-sm font-medium">
              {user ? (
                <>
                  <button onClick={handleSignOut} className={`px-3 py-2 rounded-lg text-muted hover:text-primary hover:bg-white/5 transition-colors ${focusRing}`}>Sign Out</button>
                  <a href="dashboard.html" className={`group inline-flex items-center gap-1.5 bg-primary text-black pl-4 pr-3 py-2 rounded-lg font-semibold hover:-translate-y-0.5 hover:shadow-[0_8px_24px_-8px_rgba(255,255,255,0.4)] transition-all duration-200 ${focusRing}`}>
                    Dashboard <Icon name="arrow-right" size={15} className="transition-transform duration-200 group-hover:translate-x-0.5" />
                  </a>
                </>
              ) : (
                <>
                  <a href="login.html" className={`px-3 py-2 rounded-lg text-muted hover:text-primary hover:bg-white/5 transition-colors ${focusRing}`}>Login</a>
                  <a href="signup.html" className={`group inline-flex items-center gap-1.5 bg-primary text-black pl-4 pr-3 py-2 rounded-lg font-semibold hover:-translate-y-0.5 hover:shadow-[0_8px_24px_-8px_rgba(255,255,255,0.4)] transition-all duration-200 ${focusRing}`}>
                    Get Started <Icon name="arrow-right" size={15} className="transition-transform duration-200 group-hover:translate-x-0.5" />
                  </a>
                </>
              )}
            </div>

            {/* Mobile: hamburger */}
            <button
              onClick={() => setMenuOpen((v) => !v)}
              aria-label={menuOpen ? 'Close menu' : 'Open menu'}
              aria-expanded={menuOpen}
              className={`md:hidden w-10 h-10 flex items-center justify-center rounded-lg text-primary hover:bg-white/5 transition-colors ${focusRing}`}
            >
              <Icon name={menuOpen ? 'x' : 'menu'} size={22} />
            </button>
          </nav>

          {/* Mobile menu overlay */}
          <AnimatePresence>
            {menuOpen && (
              <motion.div
                className="md:hidden fixed inset-0 top-0 z-40 bg-black/80 backdrop-blur-md"
                initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                onClick={() => setMenuOpen(false)}
              >
                <motion.div
                  className="absolute top-20 inset-x-4 glass-panel rounded-2xl border border-white/10 p-3 shadow-[0_16px_48px_-12px_rgba(0,0,0,0.8)]"
                  initial={{ opacity: 0, y: -12 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -12 }}
                  transition={{ duration: 0.2, ease: 'easeOut' }}
                  onClick={(e) => e.stopPropagation()}
                >
                  {navLinks.map((l) => (
                    <a key={l.href} href={l.href} className="flex items-center justify-between px-4 py-3 rounded-xl text-base text-accent hover:bg-white/5 transition-colors">
                      {l.label} <Icon name="arrow-up-right" size={16} className="text-muted" />
                    </a>
                  ))}
                  <div className="h-px bg-white/10 my-2" />
                  {user ? (
                    <>
                      <button onClick={handleSignOut} className="w-full text-left px-4 py-3 rounded-xl text-base text-muted hover:bg-white/5 transition-colors">Sign Out</button>
                      <a href="dashboard.html" className="mt-1 flex items-center justify-center gap-2 bg-primary text-black px-4 py-3 rounded-xl font-semibold">Dashboard <Icon name="arrow-right" size={16} /></a>
                    </>
                  ) : (
                    <>
                      <a href="login.html" className="flex items-center justify-between px-4 py-3 rounded-xl text-base text-accent hover:bg-white/5 transition-colors">Login</a>
                      <a href="signup.html" className="mt-1 flex items-center justify-center gap-2 bg-primary text-black px-4 py-3 rounded-xl font-semibold">Get Started <Icon name="arrow-right" size={16} /></a>
                    </>
                  )}
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>
        </header>
      );
    }

    function ElegantShape({ className = "", delay = 0, width = 400, height = 100, rotate = 0, gradient = "from-white/[0.08]" }) {
      return (
        <motion.div
          initial={{ opacity: 0, y: -150, rotate: rotate - 15 }}
          animate={{ opacity: 1, y: 0, rotate: rotate }}
          transition={{ duration: 2.4, delay, ease: [0.23, 0.86, 0.39, 0.96], opacity: { duration: 1.2 } }}
          className={"absolute " + className}
        >
          <motion.div
            animate={{ y: [0, 15, 0] }}
            transition={{ duration: 12, repeat: Infinity, ease: "easeInOut" }}
            style={{ width, height }}
            className="relative"
          >
            <div className={"absolute inset-0 rounded-full bg-gradient-to-r to-transparent " + gradient + " backdrop-blur-[2px] border-2 border-white/[0.15] shadow-[0_8px_32px_0_rgba(255,255,255,0.1)] after:absolute after:inset-0 after:rounded-full after:bg-[radial-gradient(circle_at_50%_50%,rgba(255,255,255,0.2),transparent_70%)]"} />
          </motion.div>
        </motion.div>
      );
    }
    function HeroShapes() {
      return (
        <div className="absolute inset-x-0 top-0 h-[820px] overflow-hidden pointer-events-none z-0">
          <div className="absolute inset-0 bg-gradient-to-br from-[rgba(138,43,226,0.06)] via-transparent to-[rgba(65,105,225,0.06)] blur-3xl" />
          <ElegantShape delay={0.3} width={600} height={140} rotate={12} gradient="from-[rgba(138,43,226,0.18)]" className="left-[-10%] md:left-[-5%] top-[15%] md:top-[18%]" />
          <ElegantShape delay={0.5} width={500} height={120} rotate={-15} gradient="from-[rgba(65,105,225,0.18)]" className="right-[-5%] md:right-[0%] top-[46%] md:top-[48%]" />
          <ElegantShape delay={0.4} width={300} height={80} rotate={-8} gradient="from-[rgba(109,40,217,0.16)]" className="left-[3%] md:left-[8%] top-[60%] md:top-[62%]" />
          <ElegantShape delay={0.6} width={200} height={60} rotate={20} gradient="from-[rgba(168,85,247,0.14)]" className="right-[12%] md:right-[18%] top-[9%] md:top-[13%]" />
          <ElegantShape delay={0.7} width={150} height={40} rotate={-25} gradient="from-[rgba(59,130,246,0.14)]" className="left-[18%] md:left-[24%] top-[4%] md:top-[8%]" />
          <div className="absolute inset-x-0 bottom-0 h-44 bg-gradient-to-t from-black to-transparent" />
        </div>
      );
    }

    function Hero({ user, hasAgents }) {
      return (
        <section className="relative pt-40 pb-20 px-6 flex flex-col items-center z-10 overflow-hidden">
          <div className="bg-grid"></div>
          <HeroShapes />

          <div className="max-w-4xl mx-auto text-center relative z-10 mt-10">
            <h1 className="text-5xl md:text-7xl font-bold tracking-tighter mb-6 text-primary leading-tight">
              Stop missing calls.<br/>Start booking <span className="italic text-gray-400 font-serif">jobs</span>.
            </h1>
            <p className="text-muted text-lg md:text-xl max-w-2xl mx-auto mb-10 leading-relaxed">
              The hyper-intelligent AI receptionist for service businesses. Answers in &lt;12s. Qualifies leads. Books directly to your calendar. 24/7.
            </p>
            <div className="flex flex-col sm:flex-row gap-4 justify-center items-center">
              <a href={user ? "dashboard.html" : "signup.html"} className="bg-primary text-black px-8 py-3 rounded-md font-bold hover:bg-gray-200 transition-colors tracking-wide text-sm inline-block">
                {user ? "Enter Dashboard" : "Get Started"}
              </a>
              {!hasAgents && (
                <a href="demo.html" className="border border-border text-primary px-8 py-3 rounded-md font-bold hover:bg-surface transition-colors tracking-wide text-sm glass-panel inline-block">
                  Demo
                </a>
              )}
            </div>
          </div>

          <HeroMockup />
        </section>
      );
    }

    function HeroMockup() {
      const [activeTab, setActiveTab] = React.useState('phone');
      const [activeFile, setActiveFile] = React.useState('live_call.ts');

      const renderContent = () => {
        if (activeTab === 'phone') {
          return (
            <>
               <div className="flex-1 flex flex-col bg-[#0a0a0a] overflow-hidden">
                  <div className="h-10 border-b border-border flex items-center px-4 gap-4 text-sm font-mono bg-[#080808]">
                    <div 
                      onClick={() => setActiveFile('live_call.ts')}
                      className={`${activeFile === 'live_call.ts' ? 'text-primary border-b-2 border-primary' : 'text-muted hover:text-primary'} h-full flex items-center pt-1 cursor-pointer transition-colors`}
                    >
                      <Icon name="file-code" size={14} className="mr-2"/> live_call.ts
                    </div>
                    <div 
                      onClick={() => setActiveFile('intent_parser.py')}
                      className={`${activeFile === 'intent_parser.py' ? 'text-primary border-b-2 border-primary' : 'text-muted hover:text-primary'} h-full flex items-center pt-1 cursor-pointer transition-colors`}
                    >
                      <Icon name="file-json" size={14} className="mr-2"/> intent_parser.py
                    </div>
                  </div>
                  <div className="flex-1 p-6 font-mono text-sm overflow-y-auto relative">
                    {activeFile === 'live_call.ts' ? (
                      <>
                        <div className="text-muted mb-4">// Processing incoming connection from +1 (555) 019-2834</div>
                        <div className="flex gap-4 mb-2">
                          <span className="text-[#4169e1] w-16 flex-shrink-0">System</span>
                          <span className="text-primary">"Thanks for calling Apex HVAC. This is Ellevux, the AI assistant. Are you calling for emergency service or to schedule a routine tune-up?"</span>
                        </div>
                        <div className="flex gap-4 mb-2">
                          <span className="text-[#ff5f56] w-16 flex-shrink-0">Caller</span>
                          <span className="text-gray-400">"Uh, hi. Yeah, my AC just started leaking water everywhere and it's 90 degrees out. I need someone ASAP."</span>
                        </div>
                        <div className="flex gap-4 mb-6">
                          <span className="text-[#4169e1] w-16 flex-shrink-0">System</span>
                          <span className="text-primary">"I can help with that immediately. I'm flagging this as an emergency leak. Let me check our next available agent..."</span>
                        </div>
                        
                        <motion.div 
                          initial={{ opacity: 0, y: 10 }}
                          animate={{ opacity: 1, y: 0 }}
                          transition={{ delay: 0.1 }}
                          className="border border-border bg-[#111] rounded-md p-4 mt-8 border-l-2 border-l-[#27c93f] relative overflow-hidden"
                        >
                          <div className="absolute top-0 right-0 w-32 h-32 bg-[#27c93f] opacity-5 blur-2xl rounded-full"></div>
                          <div className="text-xs text-[#27c93f] uppercase tracking-widest mb-3 font-bold flex items-center gap-2"><Icon name="zap" size={14} /> Extraction Complete</div>
                          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 relative z-10">
                            <div><span className="text-muted">Intent:</span> <span className="text-[#ffbd2e]">emergency_repair</span></div>
                            <div><span className="text-muted">Priority:</span> <span className="text-[#ff5f56]">HIGH</span></div>
                            <div><span className="text-muted">Issue:</span> <span className="text-primary">AC Leaking Water</span></div>
                            <div><span className="text-muted">Action:</span> <span className="text-primary">Dispatch Agent</span></div>
                          </div>
                        </motion.div>
                      </>
                    ) : (
                      <>
                        <div className="text-muted mb-4"># Intent Parser Model Implementation</div>
                        <div className="text-[#8a2be2]">class</div> <div className="text-primary inline">IntentParser:</div>
                        <div className="pl-6 border-l border-[#222] ml-2 mt-2">
                           <div className="text-[#8a2be2]">def</div> <div className="text-primary inline">__init__(self, model_id=</div><div className="text-[#27c93f] inline">"ellevux-v4"</div><div className="text-primary inline">):</div><br/>
                           <div className="pl-6 text-muted">self.engine = NLP_Engine(model_id)</div><br/><br/>
                           
                           <div className="text-[#8a2be2]">async def</div> <div className="text-primary inline">parse(self, transcript: str):</div><br/>
                           <div className="pl-6">
                              <div className="text-muted"># Extracting core intent and entities</div><br/>
                              <div className="text-primary">analysis = <span className="text-[#8a2be2]">await</span> self.engine.analyze(transcript)</div><br/>
                              <div className="text-[#8a2be2]">return</div> <div className="text-primary inline">{`{`}</div><br/>
                              <div className="pl-6">
                                 <span className="text-[#ff5f56]">"intent"</span>: analysis.intent,<br/>
                                 <span className="text-[#ff5f56]">"urgency"</span>: analysis.get_urgency_score(),<br/>
                                 <span className="text-[#ff5f56]">"entities"</span>: analysis.entities<br/>
                              </div>
                              <div className="text-primary">{`}`}</div>
                           </div>
                        </div>
                        
                        <div className="mt-8 border border-border bg-[#111] rounded-md p-4 border-l-2 border-l-[#4169e1] relative overflow-hidden">
                           <div className="text-xs text-[#4169e1] uppercase tracking-widest mb-3 font-bold flex items-center gap-2"><Icon name="cpu" size={14} /> Model Logic</div>
                           <div className="text-xs text-muted leading-relaxed">
                              Currently utilizing <span className="text-primary">Transformer-XL</span> with custom <span className="text-primary">service-sector</span> weights for high accuracy in HVAC/Plumbing domains.
                           </div>
                        </div>
                        
                        <motion.div 
                          initial={{ opacity: 0, scale: 0.95 }}
                          animate={{ opacity: 1, scale: 1 }}
                          className="mt-6 p-4 rounded bg-[#050505] border border-border flex items-center justify-between"
                        >
                          <div className="flex items-center gap-3">
                            <div className="w-2 h-2 rounded-full bg-[#27c93f] animate-pulse"></div>
                            <div className="text-xs text-muted font-mono">Inference active: 12ms</div>
                          </div>
                          <div className="text-xs font-bold text-[#8a2be2]">v2.0.4-stable</div>
                        </motion.div>
                      </>
                    )}
                  </div>
              </div>
              <div className="w-full md:w-80 border-t md:border-t-0 md:border-l border-border bg-[#050505] p-6 flex flex-col gap-8">
                 <div>
                   <div className="text-xs font-mono text-muted uppercase tracking-widest mb-4 flex items-center gap-2"><Icon name="bar-chart-2" size={14}/> Live Metrics</div>
                   <div className="flex justify-between items-end mb-2">
                     <div className="text-sm text-muted">Response Time</div>
                     <div className="text-xl font-bold text-[#27c93f]">1.2s</div>
                   </div>
                   <div className="w-full bg-[#1a1a1a] h-1.5 rounded-full overflow-hidden">
                     <motion.div initial={{ width: 0 }} animate={{ width: "15%" }} transition={{ delay: 0.2, duration: 1 }} className="bg-[#27c93f] h-full"></motion.div>
                   </div>
                 </div>
                 <div>
                   <div className="flex justify-between items-end mb-2">
                     <div className="text-sm text-muted">Lead Qualification</div>
                     <div className="text-xl font-bold text-primary">94%</div>

    function App() {
      const [user, setUser] = React.useState(null);
      const [hasAgents, setHasAgents] = React.useState(false);
      const [isLoading, setIsLoading] = React.useState(true);

      React.useEffect(() => {
        const checkAgents = async (userId) => {
          const { count, error } = await window.supabaseClient
            .from('agents')
            .select('*', { count: 'exact', head: true })
            .eq('user_id', userId);
          if (!error && count > 0) setHasAgents(true);
          setIsLoading(false);
        };

        window.supabaseClient.auth.getSession().then(({ data: { session } }) => {
          const u = session?.user ?? null;
          setUser(u);
          if (u) checkAgents(u.id);
          else {
            setHasAgents(false);
            setIsLoading(false);
          }
        });

        const { data: { subscription } } = window.supabaseClient.auth.onAuthStateChange((_event, session) => {
          const u = session?.user ?? null;
          setUser(u);
          if (u) checkAgents(u.id);
          else {
            setHasAgents(false);
            setIsLoading(false);
          }
        });
        return () => subscription.unsubscribe();
      }, []);

      if (isLoading) return <div className="bg-bg min-h-screen flex items-center justify-center"><div className="w-8 h-8 border-2 border-primary border-t-transparent rounded-full animate-spin"></div></div>;

      return (
        <div className="bg-bg text-primary font-sans selection:bg-white selection:text-black min-h-screen">
          <Navbar user={user} />
          <Hero user={user} hasAgents={hasAgents} />
          {!hasAgents && <MiniBentoGrid />}
          {!hasAgents && <AlternatingSections />}
          <CTA user={user} hasAgents={hasAgents} />
          <Footer />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
