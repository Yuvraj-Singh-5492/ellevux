  <script type="importmap">
  {

  <!-- Capability gate: run the heavy scroll-3D hero ONLY on capable, non-mobile devices.
       Phones, low-RAM / few-core devices, software (non-GPU) WebGL, and reduced-motion fall
       back to the static hero + compact feature layout. Decided once, before React + the module. -->
  <script>
    window.ENABLE_3D = (function () {
      try {
        var mm = window.matchMedia;
        if (mm && mm('(prefers-reduced-motion: reduce)').matches) return false;
        // Mobile/tablet detection that is RELIABLE in <head>: pointer:coarse + UA don't depend on
        // innerWidth (which isn't device-width yet during head parsing, so phones were slipping through).
        if (mm && mm('(pointer: coarse)').matches) return false;                              // touch device = phone/tablet
        if (/Mobi|Android|iPhone|iPad|iPod|Tablet|Silk|Kindle/i.test(navigator.userAgent || '')) return false;
        if (mm && mm('(max-width: 1023px)').matches) return false;                            // small screens (backup)
        if (navigator.deviceMemory && navigator.deviceMemory < 4) return false;              // low-RAM devices
        if (navigator.hardwareConcurrency && navigator.hardwareConcurrency < 4) return false;
        var c = document.createElement('canvas');
        var gl = c.getContext('webgl2') || c.getContext('webgl');
        if (!gl) return false;
        var soft = false, dbg = gl.getExtension('WEBGL_debug_renderer_info');
        if (dbg) { var r = String(gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) || '').toLowerCase();
          soft = r.indexOf('swiftshader') > -1 || r.indexOf('software') > -1 || r.indexOf('llvmpipe') > -1 || r.indexOf('basic render') > -1; }
        var lose = gl.getExtension('WEBGL_lose_context'); if (lose) lose.loseContext();      // free the probe context
        return !soft;                                                                        // software WebGL (e.g. Brave w/o HW accel) -> off
      } catch (e) { return false; }
    })();
    if (!window.ENABLE_3D) document.documentElement.classList.add('no-3d');
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { background-color: #000000; color: #ffffff; margin: 0; padding: 0; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    ::selection { background: #ffffff; color: #000000; }
    .glass-panel {
      background: rgba(10, 10, 10, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid #1f1f1f;
    }

    /* Real frosted-glass cards for the features grid */
    .feat-glass {
      position: relative; isolation: isolate; overflow: hidden;
      background: linear-gradient(135deg, rgba(255,255,255,0.09), rgba(255,255,255,0.03) 55%, rgba(255,255,255,0.015));
      backdrop-filter: blur(22px) saturate(170%);
      -webkit-backdrop-filter: blur(22px) saturate(170%);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.25),
        inset 0 -22px 44px -22px rgba(0,0,0,0.5),
        0 14px 36px -18px rgba(0,0,0,0.7);
      transition: transform .3s cubic-bezier(.2,.8,.2,1), border-color .3s ease, box-shadow .3s ease;
    }
    /* diagonal specular sheen across the top */
    .feat-glass::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 55%;
      background: linear-gradient(160deg, rgba(255,255,255,0.12), rgba(255,255,255,0) 60%);
      border-radius: inherit; pointer-events: none; z-index: 0;
    }
    /* colored gradient edge on hover */
    .feat-glass::after {
      content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 1px;
      background: linear-gradient(135deg, rgba(110,140,255,0.85), rgba(168,85,247,0.45) 45%, transparent 75%);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude;
      opacity: 0; transition: opacity .35s ease; z-index: 2; pointer-events: none;
    }
    .feat-glass > * { position: relative; z-index: 1; }
    .feat-glass:hover {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,0.18);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.35),
        inset 0 -22px 44px -22px rgba(0,0,0,0.5),
        0 26px 54px -22px rgba(0,0,0,0.8),
        0 0 44px -16px rgba(65,105,225,0.45);
    }
    .feat-glass:hover::after { opacity: 1; }

    /* soft ambient color behind the features grid so the glass has something to refract */
    .feat-ambient { position: absolute; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
      mask-image: radial-gradient(120% 80% at 50% 40%, black, transparent 85%);
      -webkit-mask-image: radial-gradient(120% 80% at 50% 40%, black, transparent 85%); }
    .feat-ambient span {
      position: absolute; border-radius: 9999px; filter: blur(150px); opacity: 0.08;
    }
    .feat-ambient .fa1 { width: 600px; height: 420px; top: 30%; left: -18%; background: #4169e1; }
    .feat-ambient .fa2 { width: 560px; height: 420px; bottom: 10%; right: -18%; background: #8a2be2; }

    /* Frosted-glass frame for the product mockup panels (opaque inner content,
       so the glass reads on the frame: light-catch rim, sheen, hover lift) */
    .mockup-frame {
      position: relative; isolation: isolate;
      background: linear-gradient(135deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02) 55%);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);

      border-color: rgba(255,255,255,0.18);
      box-shadow:

        0 28px 60px -22px rgba(0,0,0,0.9),
        0 0 50px -18px rgba(65,105,225,0.4);
    }

    .glow-bg {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;

    .glow-purple { background: #8a2be2; }
    .glow-blue { background: #4169e1; }
    .glow-red { background: #dc143c; }

    .mac-max { background: #27c93f; border: 1px solid #1aab29; }

      inset: 0;
      z-index: 0;

      position: relative;
    }
    .bento-glow::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      background: linear-gradient(45deg, rgba(138,43,226,0.3), rgba(65,105,225,0.3), transparent 60%);
      z-index: -1;

    /* Animated hero aurora — soft, drifting blurry blobs */
    .hero-aurora {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 780px;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .hero-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      will-change: transform;
      mix-blend-mode: screen;
    }
    .hero-blob.b1 {
      width: 460px; height: 460px;
      background: radial-gradient(circle at 30% 30%, rgba(138,43,226,0.85), transparent 70%);
      top: -40px; left: 6%;
      opacity: 0.55;
      animation: drift1 24s ease-in-out infinite;
    }
    .hero-blob.b2 {
      width: 520px; height: 520px;
      background: radial-gradient(circle at 65% 40%, rgba(65,105,225,0.8), transparent 70%);
      top: 10px; right: 2%;
      opacity: 0.5;
      animation: drift2 28s ease-in-out infinite;
    }
    .hero-blob.b3 {
      width: 360px; height: 360px;
      background: radial-gradient(circle at 50% 50%, rgba(109,40,217,0.75), transparent 70%);
      top: 22%; left: 38%;
      opacity: 0.45;
      animation: drift3 32s ease-in-out infinite;
    }
    @keyframes drift1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(110px, 70px) scale(1.15); }
      66%      { transform: translate(40px, 130px) scale(0.95); }
    }
    @keyframes drift2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(-100px, 90px) scale(1.1); }
      66%      { transform: translate(-50px, -30px) scale(1.05); }
    }
    @keyframes drift3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%      { transform: translate(-90px, -50px) scale(1.2); }
    }
    @media (prefers-reduced-motion: reduce) {

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { motion, AnimatePresence, useScroll, useTransform, useSpring, useInView } = window.Motion;

    function Icon({ name, className = "", size = 24 }) {
      const ref = useRef(null);

        if (ref.current && window.lucide) {
          window.lucide.createIcons({
            root: ref.current,
            attrs: { class: className, width: size, height: size }
          });
        }
      }, [name, className, size]);
      return <span ref={ref} className="inline-flex items-center justify-center"><i data-lucide={name}></i></span>;
    }

    function Hero({ user, hasAgents }) {

    // Tiny 3D "live core" — a pulsing rotating icosahedron = the console is alive/processing.
    function CoreOrb() {
      const mountRef = useRef(null);
      useEffect(() => {
        const mount = mountRef.current;
        if (!mount || !window.THREE) return;
        const THREE = window.THREE;
        const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        let renderer;
        try { renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); }
        catch (e) { return; }
        const SZ = 18;
        renderer.setSize(SZ, SZ);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        mount.appendChild(renderer.domElement);
        mount.querySelector('.core-fallback')?.style.setProperty('display', 'none');

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
        camera.position.z = 3;
        const geo = new THREE.IcosahedronGeometry(1, 0);
        const wire = new THREE.LineSegments(
          new THREE.WireframeGeometry(geo),
          new THREE.LineBasicMaterial({ color: 0x27c93f, transparent: true, opacity: 0.9 })
        );
        scene.add(wire);

        const clock = new THREE.Clock();
        let raf, running = true;
        function tick() {
          if (!running) return;
          const t = clock.getElapsedTime();
          wire.rotation.y = t * 0.8; wire.rotation.x = t * 0.4;
          const s = 0.85 + Math.sin(t * 3) * 0.12;   // pulse
          wire.scale.setScalar(s);
          renderer.render(scene, camera);
          raf = requestAnimationFrame(tick);
        }
        if (reduce) renderer.render(scene, camera); else tick();
        const onVis = () => { if (document.hidden) { running = false; cancelAnimationFrame(raf); } else if (!reduce) { running = true; tick(); } };
        document.addEventListener('visibilitychange', onVis);

        return () => {
          running = false; cancelAnimationFrame(raf);
          document.removeEventListener('visibilitychange', onVis);
          geo.dispose(); wire.geometry.dispose(); wire.material.dispose(); renderer.dispose();

    // Tiny 3D "data inflow" — particles streaming inward into a glowing core (lead injected into CRM).
    function DataInflow() {
      const mountRef = useRef(null);
      useEffect(() => {
        const mount = mountRef.current;
        if (!mount || !window.THREE) return;
        const THREE = window.THREE;
        const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        let renderer;
        try { renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); }
        catch (e) { return; }
        const SZ = 28;
        renderer.setSize(SZ, SZ);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        mount.appendChild(renderer.domElement);
        mount.querySelector('.inflow-fallback')?.style.setProperty('display', 'none');

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
        camera.position.z = 3.2;
        const group = new THREE.Group(); group.rotation.x = 0.5; scene.add(group);

        // glowing core (the CRM destination)
        const core = new THREE.Mesh(new THREE.SphereGeometry(0.22, 16, 16),
          new THREE.MeshBasicMaterial({ color: 0xffbd2e }));
        group.add(core);

        // particles that spiral inward then reset to the rim
        const N = 36;
        const pos = new Float32Array(N * 3);
        const seed = [];
        for (let i = 0; i < N; i++) {
          seed.push({ ang: Math.random() * Math.PI * 2, tilt: (Math.random() - 0.5) * 1.2, off: Math.random() });
        }
        const pg = new THREE.BufferGeometry(); pg.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const c = document.createElement('canvas'); c.width = c.height = 64;
        const g = c.getContext('2d'); const grd = g.createRadialGradient(32,32,0,32,32,32);
        grd.addColorStop(0,'rgba(255,255,255,1)'); grd.addColorStop(0.4,'rgba(255,210,120,0.7)'); grd.addColorStop(1,'rgba(255,255,255,0)');
        g.fillStyle = grd; g.beginPath(); g.arc(32,32,32,0,Math.PI*2); g.fill();
        const sprite = new THREE.CanvasTexture(c);
        const parts = new THREE.Points(pg, new THREE.PointsMaterial({ size: 0.16, map: sprite, transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, color: 0xffd27a }));
        group.add(parts);

        const clock = new THREE.Clock();
        let raf, running = true;
        function tick() {
          if (!running) return;
          const t = clock.getElapsedTime();
          const arr = pg.attributes.position.array;
          for (let i = 0; i < N; i++) {
            const s = seed[i];
            const p = (t * 0.5 + s.off) % 1;          // 1 -> 0 radius (inward)
            const radius = (1 - p) * 1.5;
            const ang = s.ang + p * 4;                // spiral
            arr[i*3]   = Math.cos(ang) * radius;
            arr[i*3+1] = s.tilt * radius;
            arr[i*3+2] = Math.sin(ang) * radius;
          }
          pg.attributes.position.needsUpdate = true;
          core.material.opacity = 0.7 + Math.sin(t * 3) * 0.3;
          group.rotation.y = t * 0.25;
          renderer.render(scene, camera);
          raf = requestAnimationFrame(tick);
        }
        if (reduce) { /* static frame */ renderer.render(scene, camera); } else tick();
        const onVis = () => { if (document.hidden) { running = false; cancelAnimationFrame(raf); } else if (!reduce) { running = true; tick(); } };
        document.addEventListener('visibilitychange', onVis);

        return () => {
          running = false; cancelAnimationFrame(raf);
          document.removeEventListener('visibilitychange', onVis);
          core.geometry.dispose(); core.material.dispose(); pg.dispose(); parts.material.dispose(); sprite.dispose(); renderer.dispose();
          if (renderer.domElement.parentNode) renderer.domElement.parentNode.removeChild(renderer.domElement);
        };
      }, []);
      return (
        <div ref={mountRef} className="w-7 h-7 relative flex items-center justify-center shrink-0" aria-hidden="true">
          <span className="inflow-fallback"><Icon name="check-circle" size={14} /></span>
        </div>
      );
    }

        const clock = new THREE.Clock();
        let raf, running = true;
        function tick() {
          if (!running) return;
          const t = clock.getElapsedTime();
          bars.forEach((b, i) => {
            const hgt = 0.25 + (Math.sin(t * 4 + i * 0.7) * 0.5 + 0.5) * 1.5;

          });

          raf = requestAnimationFrame(tick);
        }
        if (reduce) renderer.render(scene, camera); else tick();
        const onVis = () => { if (document.hidden) { running = false; cancelAnimationFrame(raf); } else if (!reduce) { running = true; tick(); } };
        document.addEventListener('visibilitychange', onVis);

        return () => {
          running = false; cancelAnimationFrame(raf);

    // Tiny 3D "signal pulse" — concentric rings emanating outward (messages going out).
    function SignalPulse() {
      const mountRef = useRef(null);
      useEffect(() => {
        const mount = mountRef.current;
        if (!mount || !window.THREE) return;
        const THREE = window.THREE;
        const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        let renderer;
        try { renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); }
        catch (e) { return; }
        const W = 28, H = 28;
        renderer.setSize(W, H);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        mount.appendChild(renderer.domElement);
        mount.querySelector('.pulse-fallback')?.style.setProperty('display', 'none');

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
        camera.position.z = 3.4; camera.lookAt(0,0,0);
        const group = new THREE.Group(); group.rotation.x = 1.1; scene.add(group); // tilt for 3D feel

        // center dot
        const dot = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16),
          new THREE.MeshBasicMaterial({ color: 0x27c93f }));
        group.add(dot);

        // three expanding rings
        const rings = [];
        for (let i = 0; i < 3; i++) {
          const r = new THREE.Mesh(
            new THREE.RingGeometry(0.9, 1.0, 48),
            new THREE.MeshBasicMaterial({ color: 0x27c93f, transparent: true, opacity: 0.5, side: THREE.DoubleSide })
          );
          group.add(r); rings.push(r);
        }

        const clock = new THREE.Clock();
        let raf, running = true;
        function tick() {
          if (!running) return;
          const t = clock.getElapsedTime();
          rings.forEach((r, i) => {
            const p = (t * 0.6 + i / 3) % 1;       // 0..1 expansion phase, staggered
            const s = 0.2 + p * 1.3;
            r.scale.set(s, s, s);
            r.material.opacity = (1 - p) * 0.6;
          });
          dot.material.opacity = 0.7 + Math.sin(t * 4) * 0.3;
          renderer.render(scene, camera);
          raf = requestAnimationFrame(tick);
        }
        if (reduce) renderer.render(scene, camera); else tick();
        const onVis = () => { if (document.hidden) { running = false; cancelAnimationFrame(raf); } else if (!reduce) { running = true; tick(); } };
        document.addEventListener('visibilitychange', onVis);

        return () => {
          running = false; cancelAnimationFrame(raf);
          document.removeEventListener('visibilitychange', onVis);
          dot.geometry.dispose(); dot.material.dispose();
          rings.forEach(r => { r.geometry.dispose(); r.material.dispose(); });
          renderer.dispose();
          if (renderer.domElement.parentNode) renderer.domElement.parentNode.removeChild(renderer.domElement);
        };
      }, []);
      return (
        <div ref={mountRef} className="w-7 h-7 relative flex items-center justify-center shrink-0" aria-hidden="true">
          <span className="pulse-fallback w-2 h-2 rounded-full bg-[#27c93f] animate-pulse"></span>
        </div>
      );
    }

    // Tiny 3D "router" — a hub node sends a pulse along a branch to the active location node.
    function RouteHub() {
      const mountRef = useRef(null);
      useEffect(() => {
        const mount = mountRef.current;
        if (!mount || !window.THREE) return;
        const THREE = window.THREE;
        const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        let renderer;
        try { renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); }
        catch (e) { return; }
        const SZ = 28;
        renderer.setSize(SZ, SZ);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        mount.appendChild(renderer.domElement);
        mount.querySelector('.route-fallback')?.style.setProperty('display', 'none');

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
        camera.position.z = 3.4;
        const group = new THREE.Group(); group.rotation.x = 0.5; group.rotation.z = 0.2; scene.add(group);

        const GREEN = 0x27c93f, DIM = 0x555555;
        // hub (left) + two destination nodes (right, upper=active, lower=full)
        const hub = new THREE.Vector3(-1.1, 0, 0);
        const dest1 = new THREE.Vector3(1.1, 0.6, 0);   // active
        const dest2 = new THREE.Vector3(1.1, -0.6, 0);  // full/dim
        const nodeGeo = new THREE.SphereGeometry(0.16, 16, 16);
        const hubMesh = new THREE.Mesh(nodeGeo, new THREE.MeshBasicMaterial({ color: GREEN }));
        hubMesh.position.copy(hub); group.add(hubMesh);
        const d1 = new THREE.Mesh(nodeGeo, new THREE.MeshBasicMaterial({ color: GREEN }));
        d1.position.copy(dest1); group.add(d1);
        const d2 = new THREE.Mesh(nodeGeo, new THREE.MeshBasicMaterial({ color: DIM }));
        d2.position.copy(dest2); group.add(d2);

        // static branch lines
        const mkLine = (a, b, col, op) => new THREE.Line(
          new THREE.BufferGeometry().setFromPoints([a, b]),
          new THREE.LineBasicMaterial({ color: col, transparent: true, opacity: op }));
        const l1 = mkLine(hub, dest1, GREEN, 0.4); group.add(l1);
        const l2 = mkLine(hub, dest2, DIM, 0.25); group.add(l2);

        // travelling pulse along the active branch
        const c = document.createElement('canvas'); c.width = c.height = 64;
        const g = c.getContext('2d'); const grd = g.createRadialGradient(32,32,0,32,32,32);
        grd.addColorStop(0,'rgba(255,255,255,1)'); grd.addColorStop(0.4,'rgba(140,255,170,0.8)'); grd.addColorStop(1,'rgba(255,255,255,0)');
        g.fillStyle = grd; g.beginPath(); g.arc(32,32,32,0,Math.PI*2); g.fill();
        const sprite = new THREE.CanvasTexture(c);
        const pulse = new THREE.Sprite(new THREE.SpriteMaterial({ map: sprite, color: 0x8cffaa, transparent: true, depthWrite: false, blending: THREE.AdditiveBlending }));
        pulse.scale.set(0.4, 0.4, 0.4); group.add(pulse);

        const clock = new THREE.Clock();
        let raf, running = true;
        function tick() {
          if (!running) return;
          const t = clock.getElapsedTime();
          const p = (t * 0.8) % 1;                 // hub -> dest1
          pulse.position.lerpVectors(hub, dest1, p);
          pulse.material.opacity = Math.sin(p * Math.PI); // fade in/out along the trip
          d1.material.color.setHex(GREEN);
          d1.scale.setScalar(p > 0.85 ? 1.4 : 1);  // active node "receives" -> pop
          hubMesh.material.opacity = 0.7 + Math.sin(t * 4) * 0.3;
          renderer.render(scene, camera);
          raf = requestAnimationFrame(tick);
        }
        if (reduce) renderer.render(scene, camera); else tick();
        const onVis = () => { if (document.hidden) { running = false; cancelAnimationFrame(raf); } else if (!reduce) { running = true; tick(); } };
        document.addEventListener('visibilitychange', onVis);

        return () => {
          running = false; cancelAnimationFrame(raf);
          document.removeEventListener('visibilitychange', onVis);
          nodeGeo.dispose(); hubMesh.material.dispose(); d1.material.dispose(); d2.material.dispose();
          l1.geometry.dispose(); l1.material.dispose(); l2.geometry.dispose(); l2.material.dispose();
          pulse.material.dispose(); sprite.dispose(); renderer.dispose();
          if (renderer.domElement.parentNode) renderer.domElement.parentNode.removeChild(renderer.domElement);
        };
      }, []);
      return (
        <div ref={mountRef} className="w-7 h-7 relative flex items-center justify-center shrink-0" aria-hidden="true">
          <span className="route-fallback w-2 h-2 rounded-full bg-[#27c93f] animate-pulse"></span>
        </div>
      );
    }

    function App() {
      const [user, setUser] = React.useState(null);
      const [hasAgents, setHasAgents] = React.useState(false);
      const [isLoading, setIsLoading] = React.useState(true);

      React.useEffect(() => {
        const checkAgents = async (userId) => {
          const { count, error } = await window.supabaseClient
            .from('agents')
            .select('*', { count: 'exact', head: true })
            .eq('user_id', userId);
          if (!error && count > 0) setHasAgents(true);
          setIsLoading(false);
        };

        window.supabaseClient.auth.getSession().then(({ data: { session } }) => {
          const u = session?.user ?? null;
          setUser(u);
          if (u) checkAgents(u.id);
          else {
            setHasAgents(false);
            setIsLoading(false);
          }
        });

        const { data: { subscription } } = window.supabaseClient.auth.onAuthStateChange((_event, session) => {
          const u = session?.user ?? null;
          setUser(u);
          if (u) checkAgents(u.id);
          else {
            setHasAgents(false);
            setIsLoading(false);
          }
        });
        return () => subscription.unsubscribe();
      }, []);

      if (isLoading) return <div className="bg-bg min-h-screen flex items-center justify-center"><div className="w-8 h-8 border-2 border-primary border-t-transparent rounded-full animate-spin"></div></div>;

        const cx = (mnx+mxx)/2, cyc = (mny+mxy)/2, cz = (mnz+mxz)/2, k = HEAD_H / (mxy - mny);
        for (let i = 0; i < bodyCount; i++) { const ti = (nEye + i) * 3; target[ti] = (tmp[i*3]-cx)*k; target[ti+1] = (tmp[i*3+1]-cyc)*k; target[ti+2] = (tmp[i*3+2]-cz)*k; }
        for (let i = 0; i < N; i++) delay[i] = DMAX * clamp01(0.5 + target[i*3+1] / 3 + Math.random() * 0.25);  // base first, crown last
        targetReady = true;
      }
      new GLTFLoader().load('mannequin_model/scene.gltf', sampleMannequin, undefined, e => console.error('[ellevux] mannequin load failed', e));

      // phone-shaped sand source (world-unit slab, baked to world on dissolve)
      const startLocal = new Float32Array(N * 3);
      const startWorld = new Float32Array(N * 3);
      (function buildPhoneStart() {
        const H = fitH(), W = H * 0.46, D = 0.16, rad = Math.min(W, H) * 0.18;
        for (let i = 0; i < N; i++) {
          let x, y;
          do { x = rnd() * W * 0.5; y = rnd() * H * 0.5; }
          while ((Math.abs(x) - (W * 0.5 - rad)) > 0 && (Math.abs(y) - (H * 0.5 - rad)) > 0 &&
            ((Math.abs(x) - (W * 0.5 - rad)) ** 2 + (Math.abs(y) - (H * 0.5 - rad)) ** 2) > rad * rad);
          startLocal[i*3] = x; startLocal[i*3+1] = y; startLocal[i*3+2] = rnd() * D * 0.5;
        }
      })();
      let startBaked = false, phoneCx = anchorX(), phoneCy = 0.1, phoneCz = 0;
      const _wc = new THREE.Vector3();
      function bakeStartWorld() {
        phoneGroup.updateWorldMatrix(true, true); phoneGroup.getWorldPosition(_wc);
        for (let i = 0; i < N; i++) { startWorld[i*3] = _wc.x + startLocal[i*3]; startWorld[i*3+1] = _wc.y + startLocal[i*3+1]; startWorld[i*3+2] = _wc.z + startLocal[i*3+2]; }
        phoneCx = _wc.x; phoneCy = _wc.y; phoneCz = _wc.z; startBaked = true;
      }

      function softSprite() {
        const cv = document.createElement('canvas'); cv.width = cv.height = 64; const g = cv.getContext('2d');
        const rg = g.createRadialGradient(32, 32, 0, 32, 32, 32);
        rg.addColorStop(0, 'rgba(255,255,255,1)'); rg.addColorStop(.4, 'rgba(255,255,255,.65)'); rg.addColorStop(1, 'rgba(255,255,255,0)');
        g.fillStyle = rg; g.fillRect(0, 0, 64, 64); return new THREE.CanvasTexture(cv);
      }
      const sprite = softSprite();
      const pos = new Float32Array(N * 3); pos.set(startLocal);
      const colors = new Float32Array(N * 3);
      const geo = new THREE.BufferGeometry();
      const posAttr = new THREE.BufferAttribute(pos, 3); posAttr.setUsage(THREE.DynamicDrawUsage);
      geo.setAttribute('position', posAttr);
      geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      const bodyMat = new THREE.PointsMaterial({ size: 0.055, map: sprite, vertexColors: true, transparent: true, depthWrite: false, sizeAttenuation: true, blending: THREE.NormalBlending, opacity: 0 });
      const sandGroup = new THREE.Group(); scene.add(sandGroup);
      const points = new THREE.Points(geo, bodyMat); points.frustumCulled = false; points.visible = false; sandGroup.add(points);

      const eyeIdx = []; for (let i = 0; i < N; i++) if (isEye[i]) eyeIdx.push(i);
      const eyePos = new Float32Array(eyeIdx.length * 3);
      const eyeGeo = new THREE.BufferGeometry();
      const eyePosAttr = new THREE.BufferAttribute(eyePos, 3); eyePosAttr.setUsage(THREE.DynamicDrawUsage);
      eyeGeo.setAttribute('position', eyePosAttr);
      const eyeMat = new THREE.PointsMaterial({ size: 0.10, map: sprite, color: lin(0x6ea0ff), transparent: true, depthWrite: false, sizeAttenuation: true, blending: THREE.AdditiveBlending, opacity: 0 });
      const eyePoints = new THREE.Points(eyeGeo, eyeMat); eyePoints.frustumCulled = false; eyePoints.visible = false; sandGroup.add(eyePoints);

      const C_TITAN = lin(0xb8bcc4), C_TITANHI = lin(0xd9dde4), C_STEEL = lin(0x9fb0cc);
      const _col = new THREE.Color(); let colorKey = -1;
      function writeColors(gp) {
        const tint = 0.5 * smoothstep((gp - 0.45) / 0.5);
        for (let i = 0; i < N; i++) {
          if (isEye[i]) { colors[i*3] = 1; colors[i*3+1] = 1; colors[i*3+2] = 1; continue; }
          _col.copy(seed[i] > 0.5 ? C_TITAN : C_TITANHI).lerp(C_STEEL, tint);
          colors[i*3] = _col.r; colors[i*3+1] = _col.g; colors[i*3+2] = _col.b;
        }
        geo.getAttribute('color').needsUpdate = true;
      }

      let bento = null;
      function getBento() { if (bento && document.body.contains(bento)) return bento; bento = document.getElementById('features-bento'); return bento; }
      const _anchor = new THREE.Vector3();
      function assemblyCenter(out, r) {
        const vh = window.innerHeight;
        const screenY = (r ? r.top : vh * 0.6) - vh * 0.12;
        const ndcY = -((screenY / vh) * 2 - 1);
        const topRoom = halfH * 0.42 - HEAD_H * 0.5, botRoom = -halfH * 0.92 + HEAD_H * 0.5;   // cap so the head clears the navbar AND the feature-section cards
        const hw = halfH * camera.aspect;
        out.x = Math.min(hw * 0.62, hw - HEAD_H * 0.5);          // assemble on the RIGHT, kept fully in frame
        out.z = 0;
        out.y = Math.max(botRoom, Math.min(topRoom, ndcY * halfH));
        return out;
      }

      // ---- feature-section beats: each shape anchors above a section heading, on its empty side ----
      // side: -1 = LEFT half, +1 = RIGHT half. The shape lands in the column opposite the text.
      function assemblyAt(out, r, side, w, hEst) {
        const vh = window.innerHeight;
        const midView = r ? (r.top + r.height * 0.5) : vh * 0.5;   // section center → level with the centered text
        const ndcY = -((midView / vh) * 2 - 1);
        const hw = halfH * camera.aspect;
        out.x = side < 0 ? Math.max(-hw * 0.5, -hw + w * 0.55) : side > 0 ? Math.min(hw * 0.5, hw - w * 0.6) : 0;   // side 0 = centered
        out.z = 0;
        out.y = ndcY * halfH;        // ride at the text's vertical level so shape + text sit side by side
        return out;
      }
      const CLOUD_H_EST = CLOUD_W * 0.74, CAL_H_EST = CAL_W * 0.95;
      // The morph chain after the bust: voice → chat → pin → database → calendar.
      // Each beat's section rect drives BOTH the disintegration of the previous shape and the reassembly of this one.
      const FEAT = [
        { id: 'feat-voice',    side:  1, target: tVoice,  delay: dVoice, w: VOICE_W, hEst: VOICE_W * 0.55 },
        { id: 'feat-sms',      side: -1, target: target2, delay: delay2, w: CLOUD_W, hEst: CLOUD_H_EST },
        { id: 'feat-routing',  side:  1, target: tPin,    delay: dPin,   w: PIN_W,   hEst: PIN_W * 1.45 },
        { id: 'feat-crm',      side: -1, target: tDb,     delay: dDb,    w: DB_W,    hEst: DB_W * 1.25 },
        { id: 'feat-calendar', side:  1, target: target3, delay: delay3, w: CAL_W,   hEst: CAL_H_EST },
        { id: 'feat-logo',     side:  0, target: tLogo,   delay: dLogo,  w: LOGO_W,  hEst: LOGO_W * 0.4, logo: true },
      ];
      for (const F of FEAT) { F._el = null; F._r = null; F._a = new THREE.Vector3(); F.dis = 0; F.asm = 0; }
      function getFeatEl(F) { if (F._el && document.body.contains(F._el)) return F._el; F._el = document.getElementById(F.id); return F._el; }

      function updateParticles(t, mScat1, mAsm1, anchor1) {
        const sc1 = smoothstep(mScat1);   // phone disintegration
        const inv = 1 / (1 - DMAX);
        const nF = FEAT.length;
        for (let i = 0; i < N; i++) {
          const o = i * 3, sd = seed[i];
          // base = phone-shaped sand slab
          let x = startWorld[o], y = startWorld[o + 1], z = startWorld[o + 2];
          // stage 1a: phone DISINTEGRATES into a drifting sand field (same style as robot→cloud)
          if (sc1 > 0.001) {
            const rad = sc1 * scR[i];
            x += scX[i] * rad; y += scU[i] * rad * 0.9 - sc1 * scY[i]; z += scZ[i] * rad * 0.6;
            if (!reduce) { x += Math.sin(t * 0.6 + sd * 9) * 0.18 * sc1; y += Math.cos(t * 0.5 + sd * 5) * 0.18 * sc1; }
          }
          // stage 1b: drifting sand REASSEMBLES into the bust
          if (mAsm1 > 0.001) {
            const pp1 = smoothstep((mAsm1 - delay[i]) * inv);
            const bx = anchor1.x + target[o], by = anchor1.y + target[o + 1], bz = anchor1.z + target[o + 2];
            x += (bx - x) * pp1; y += (by - y) * pp1; z += (bz - z) * pp1;
            const fly = Math.sin(pp1 * Math.PI);
            if (fly > 0.001 && !reduce) {
              const amp = fly * 0.35;
              x += amp * Math.sin(t * 0.9 + sd * 12.9898 + y * 1.7); y += amp * Math.cos(t * 1.1 + sd * 78.233 + z * 1.5); z += amp * 0.6 * Math.sin(t * 0.8 + sd * 37.719 + x * 1.6);
            }
          }
          // feature beats: each disintegrates the PREVIOUS shape, then reassembles its own
          for (let b = 0; b < nF; b++) {
            const F = FEAT[b];
            if (F.dis > 0.001) {                                // scatter the shape that lived at the previous beat
              const sc = smoothstep(F.dis);
              const rad = sc * scR[i];
              x += scX[i] * rad; y += scU[i] * rad * 0.9 - sc * scY[i]; z += scZ[i] * rad * 0.6;
              if (!reduce) { x += Math.sin(t * 0.6 + sd * 9) * 0.18 * sc; y += Math.cos(t * 0.5 + sd * 5) * 0.18 * sc; }
            }
            if (F.asm > 0.001) {                                // reassemble into this beat's shape
              const pp = smoothstep((F.asm - F.delay[i]) * inv);
              const tx = F._a.x + F.target[o], ty = F._a.y + F.target[o + 1], tz = F._a.z + F.target[o + 2];
              x += (tx - x) * pp; y += (ty - y) * pp; z += (tz - z) * pp;
              const fly = Math.sin(pp * Math.PI);
              if (fly > 0.001 && !reduce) {
                const amp = fly * 0.35;
                x += amp * Math.sin(t * 0.9 + sd * 4.1 + y * 1.7); y += amp * Math.cos(t * 1.1 + sd * 9.7 + z * 1.5); z += amp * 0.6 * Math.sin(t * 0.8 + sd * 6.3 + x * 1.6);
              }
            }
          }
          pos[o] = x; pos[o + 1] = y; pos[o + 2] = z;
        }
        posAttr.needsUpdate = true;
      }

      // ---- Ellevux "calling…" screen, drawn to a canvas and used as the phone's display ----
      // (replaces the stock wallpaper on the screen material 'ZVpJkazCvASOIpG')
      const screenW = 540, screenH = 1080;
      const screenCanvas = document.createElement('canvas'); screenCanvas.width = screenW; screenCanvas.height = screenH;
      const screenCtx = screenCanvas.getContext('2d');
      const screenTex = new THREE.CanvasTexture(screenCanvas);
      screenTex.flipY = true;                  // CanvasTexture needs flipY=true here so the UI is upright
      screenTex.encoding = THREE.sRGBEncoding;
      screenTex.anisotropy = 4;
      let screenBound = false, lastScreenDraw = -1;

      const rr = (c, x, y, w, h, r) => { c.beginPath(); c.moveTo(x + r, y); c.arcTo(x + w, y, x + w, y + h, r); c.arcTo(x + w, y + h, x, y + h, r); c.arcTo(x, y + h, x, y, r); c.arcTo(x, y, x + w, y, r); c.closePath(); };
      const handset = (c, cx, cy, r, col, rot) => {
        c.save(); c.translate(cx, cy); c.rotate(rot); c.fillStyle = col;
        c.beginPath(); c.arc(0, 0, r, Math.PI * 0.16, Math.PI * 0.84, false); c.arc(0, 0, r * 0.6, Math.PI * 0.84, Math.PI * 0.16, true); c.closePath(); c.fill();
        const mr = (r + r * 0.6) / 2;[Math.PI * 0.16, Math.PI * 0.84].forEach(a => { c.beginPath(); c.arc(Math.cos(a) * mr, Math.sin(a) * mr, r * 0.28, 0, Math.PI * 2); c.fill(); });
        c.restore();
      };
      function drawCallScreen(t) {
        const c = screenCtx, W = screenW, H = screenH;
        let g = c.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#0a0b12'); g.addColorStop(1, '#06060c'); c.fillStyle = g; c.fillRect(0, 0, W, H);
        let rg = c.createRadialGradient(W / 2, 360, 0, W / 2, 360, 360); rg.addColorStop(0, 'rgba(75,105,225,0.22)'); rg.addColorStop(1, 'rgba(75,105,225,0)'); c.fillStyle = rg; c.fillRect(0, 0, W, H);
        let rg2 = c.createRadialGradient(W / 2, 760, 0, W / 2, 760, 420); rg2.addColorStop(0, 'rgba(138,43,226,0.16)'); rg2.addColorStop(1, 'rgba(138,43,226,0)'); c.fillStyle = rg2; c.fillRect(0, 0, W, H);
        // status bar
        c.textBaseline = 'middle'; c.fillStyle = '#e6e6ee'; c.font = '600 26px ui-sans-serif, system-ui, sans-serif';
        c.textAlign = 'left'; c.fillText('9:41', 36, 42);
        c.textAlign = 'right'; c.fillText('5G', W - 110, 42);
        rr(c, W - 92, 30, 46, 24, 6); c.fillStyle = '#e6e6ee'; c.fill(); c.fillStyle = '#06060c'; rr(c, W - 88, 34, 32, 16, 3); c.fill();
        // dynamic island
        c.fillStyle = '#000'; rr(c, W / 2 - 62, 30, 124, 36, 18); c.fill();
        // pulsing rings + avatar
        for (let k = 0; k < 3; k++) { const f = ((t * 0.5) + k / 3) % 1; c.beginPath(); c.arc(W / 2, 360, 110 + f * 92, 0, Math.PI * 2); c.strokeStyle = 'rgba(159,180,255,' + ((1 - f) * 0.30).toFixed(3) + ')'; c.lineWidth = 3; c.stroke(); }
        let ag = c.createLinearGradient(W / 2 - 110, 250, W / 2 + 110, 470); ag.addColorStop(0, '#4169e1'); ag.addColorStop(1, '#8a2be2');
        c.beginPath(); c.arc(W / 2, 360, 110, 0, Math.PI * 2); c.fillStyle = ag; c.fill();
        c.fillStyle = '#fff'; c.font = '700 132px ui-sans-serif, system-ui, sans-serif'; c.textAlign = 'center'; c.textBaseline = 'middle'; c.fillText('e', W / 2, 374);
        // name / subtitle / status
        c.textBaseline = 'alphabetic'; c.fillStyle = '#fff'; c.font = '700 66px ui-sans-serif, system-ui, sans-serif'; c.fillText('Ellevux', W / 2, 590);
        c.fillStyle = '#9aa0ae'; c.font = '400 30px ui-sans-serif, system-ui, sans-serif'; c.fillText('AI Receptionist', W / 2, 636);
        const dots = '.'.repeat(Math.floor(t * 2) % 4);
        c.fillStyle = '#5bd06a'; c.font = '500 34px ui-sans-serif, system-ui, sans-serif'; c.fillText('calling' + dots, W / 2, 702);
        // control row
        const cyy = 900, cols = [W / 2 - 130, W / 2, W / 2 + 130];
        cols.forEach(x => { c.beginPath(); c.arc(x, cyy, 46, 0, Math.PI * 2); c.fillStyle = 'rgba(255,255,255,0.07)'; c.fill(); c.strokeStyle = 'rgba(255,255,255,0.12)'; c.lineWidth = 2; c.stroke(); });
        c.fillStyle = '#e6e6ee';
        for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) { c.beginPath(); c.arc(W / 2 - 14 + i * 14, cyy - 14 + j * 14, 2.4, 0, Math.PI * 2); c.fill(); }       // keypad
        rr(c, cols[0] - 7, cyy - 16, 14, 22, 7); c.fill(); c.fillRect(cols[0] - 1, cyy + 7, 2, 8);                                                                       // mute mic
        c.beginPath(); c.moveTo(cols[2] - 12, cyy - 7); c.lineTo(cols[2] - 2, cyy - 7); c.lineTo(cols[2] + 8, cyy - 16); c.lineTo(cols[2] + 8, cyy + 16); c.lineTo(cols[2] - 2, cyy + 7); c.lineTo(cols[2] - 12, cyy + 7); c.closePath(); c.fill();   // speaker
        // end-call
        c.beginPath(); c.arc(W / 2, 1010, 50, 0, Math.PI * 2); c.fillStyle = '#ff3b30'; c.fill();
        handset(c, W / 2, 1010, 24, '#fff', Math.PI * 0.78);
        screenTex.needsUpdate = true;
      }
      drawCallScreen(0);

      // ---- load the iPhone model ----
      const loader = new GLTFLoader();
      loader.load('iphone_model/scene.gltf', gltf => {
        const model = gltf.scene;
        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3(); box.getSize(size);
        const center = new THREE.Vector3(); box.getCenter(center);
        model.position.sub(center);
        modelH = size.y;
        baseScale = fitH() / modelH;
        phoneGroup.scale.setScalar(baseScale);
        phoneGroup.rotation.y = Math.PI;   // screen-forward for the first paint / reduced-motion
        model.traverse(o => {
          if (o.isMesh && o.material) {
            const ms = Array.isArray(o.material) ? o.material : [o.material];
            ms.forEach(m => {
              if (phoneMats.indexOf(m) === -1) {
                m.transparent = true;
                m._base = (m.opacity == null ? 1 : m.opacity);
                if (m.normalScale) m.normalScale.multiplyScalar(0.55);   // calm the frosted-glass grain
                if ('envMapIntensity' in m) m.envMapIntensity = 1.1;     // a little more clean reflection
                if (m.name === 'ZVpJkazCvASOIpG') {                       // the display → Ellevux call screen
                  m.map = screenTex; m.emissiveMap = screenTex;
                  m.emissive = new THREE.Color(0xffffff); m.emissiveIntensity = 1.35;
                  screenBound = true;
                }
                m.needsUpdate = true;
                phoneMats.push(m);
              }
            });
          }
        });
        phoneGroup.add(model); phoneReady = true;
        renderer.render(scene, camera);   // first paint
      }, undefined, err => console.error('[ellevux] iPhone model failed to load', err));

      // ---- scroll (eased, pixel-based so the morph completes near the hero) ----
      let targetY = window.scrollY || 0, curY = targetY, mDisCur = 0;
      window.addEventListener('scroll', () => { targetY = window.scrollY || 0; }, { passive: true });
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        if (modelH) baseScale = fitH() / modelH;            // re-fit phone for the new breakpoint
        phoneGroup.position.set(anchorX(), 0.1, 0);
      });

      const clock = new THREE.Clock(); let raf, running = true;
      function tick() {
        if (!running) return;
        const t = clock.getElapsedTime();
        curY += (targetY - curY) * 0.08;
        const vh = window.innerHeight;
        const el = getBento();
        const r = el ? el.getBoundingClientRect() : null;
        let mDis = smooth(vh * 0.12, vh * 0.42, curY);               // phone mesh → sand slab (early)
        let mScat1 = 0, mAsm1 = 0;
        if (r) {
          mScat1 = smooth(vh * 0.42, vh * 0.85, curY);              // sand slab DISINTEGRATES into a drifting field
          mAsm1 = smooth(vh * 0.66, vh * 1.20, curY);               // drifting sand REASSEMBLES into the bust
        }
        // feature beats: each section rect drives [disintegrate previous shape] + [reassemble this shape]
        let maxFeat = 0;
        for (const F of FEAT) {
          const fe = getFeatEl(F); F._r = fe ? fe.getBoundingClientRect() : null;
          const mid = F._r ? (F._r.top + F._r.height * 0.5) : null;  // viewport-y of the section center (the text)
          if (mid !== null && targetReady) {
            F.dis = clamp01((vh * 1.05 - mid) / (vh * 0.45));        // scatter the previous shape (tighter window → closer features)
            F.asm = clamp01((vh * 1.0 - mid) / (vh * 0.40));         // this shape forms level with the (centered) text, then rides with it
          } else { F.dis = 0; F.asm = 0; }
          if (F.logo && !logoReady) { F.dis = 0; F.asm = 0; }        // logo PNG not sampled yet → keep the calendar formed
          if (F.dis > maxFeat) maxFeat = F.dis;
          if (F.asm > maxFeat) maxFeat = F.asm;
        }
        if (!el) mDis = 0;                                           // no target sections (e.g. logged-in) → phone stays whole
        if (!targetReady) { mScat1 = 0; mAsm1 = 0; }
        mDisCur = mDis;

        if (mDis > 0.02 && !startBaked && phoneReady) bakeStartWorld();

        // phone fade + idle
        phoneGroup.visible = mDis < 0.995 && phoneReady;
        setPhoneOpacity(1 - smooth(0.05, 0.85, mDis));
        if (phoneGroup.visible && mDis < 0.05) {
          phoneGroup.rotation.y = Math.PI + Math.sin(t * 0.3) * 0.28;
          phoneGroup.rotation.x = -0.10 + Math.sin(t * 0.5) * 0.04;
          if (screenBound && t - lastScreenDraw > 0.085) { drawCallScreen(t); lastScreenDraw = t; }
        }

        // sand visibility + colours
        const anyProg = Math.max(mDis, mScat1, mAsm1, maxFeat);
        bodyMat.opacity = smooth(0.03, 0.25, anyProg);
        const show = anyProg > 0.02 && startBaked;
        points.visible = show;
        const qk = Math.round(clamp01(mAsm1) * 20);
        if (qk !== colorKey) { colorKey = qk; writeColors(clamp01(mAsm1)); }

        // anchors → bust (#features-bento) + each feature shape (voice/chat/pin/db/calendar)
        assemblyCenter(_anchor, r);
        for (const F of FEAT) assemblyAt(F._a, F._r, F.side, F.w, F.hEst);
        const offscreen = anyProg < 0.02;
        if (show && !offscreen) updateParticles(t, mScat1, mAsm1, _anchor);

        // idle bob when a shape is fully formed and the next beat hasn't started scattering it
        let settled = (mAsm1 > 0.99 && FEAT[0].dis < 0.03);
        for (let b = 0; b < FEAT.length; b++) { const nx = FEAT[b + 1]; if (FEAT[b].asm > 0.99 && (!nx || nx.dis < 0.03)) settled = true; }
        if (settled) { sandGroup.position.y = Math.sin(t * 1.1) * 0.04; sandGroup.rotation.y = Math.sin(t * 0.25) * 0.12; }
        else { sandGroup.position.y = 0; sandGroup.rotation.y = 0; }

        rimBlue.intensity = 7 + Math.sin(t * 0.8) * 2;
        rimPurple.intensity = 6 + Math.cos(t * 0.7) * 2;

        renderer.render(scene, camera);
        raf = requestAnimationFrame(tick);
      }
      renderer.render(scene, camera);
      tick();   // scroll-driven (reduced-motion still tracks scroll, minus per-particle turbulence)

      document.addEventListener('visibilitychange', () => {
        if (document.hidden) { running = false; cancelAnimationFrame(raf); }
        else { running = true; clock.getDelta(); tick(); }
      });
    })();
  </script>
</body>
</html>
